<svg xmlns="http://www.w3.org/2000/svg" width="680" height="520" viewBox="0 0 680 520">
  <defs>
    <style>
      text { font-family: 'Inter', 'Noto Sans', sans-serif; }
      .bg { fill: #1b1e20; }
      .card { fill: #232629; }
      .text-title { fill: #eff0f1; font-size: 14px; font-weight: 600; }
      .text-info { fill: #3daee9; font-size: 11px; }
      .text-inherit { fill: #7f8c8d; font-size: 11px; font-style: italic; }
      .text-parent { fill: #bdc3c7; font-size: 13px; font-weight: 500; }
    </style>
  </defs>

  <rect class="bg" width="680" height="520" rx="12"/>

  <!-- ============================================================ -->
  <!-- FADE (parent defaults) -->
  <!-- ============================================================ -->
  <rect class="card" x="20" y="16" width="640" height="76" rx="10"/>
  <rect x="20" y="16" width="640" height="48" rx="10" fill="#262a2e"/>
  <rect x="20" y="44" width="640" height="20" fill="#262a2e"/>
  <text class="text-parent" x="40" y="46">Fade (parent defaults)</text>
  <text x="512" y="46" fill="#7f8c8d" font-size="11" font-family="Inter, sans-serif">Override</text>
  <rect x="568" y="32" width="40" height="22" rx="11" fill="#3d4349"/>
  <circle cx="579" cy="43" r="9" fill="#7f8c8d"/>
  <text class="text-inherit" x="58" y="79">Inherits all values from Global (Easing, 300ms)</text>

  <!-- ============================================================ -->
  <!-- Zone Highlight Fade -->
