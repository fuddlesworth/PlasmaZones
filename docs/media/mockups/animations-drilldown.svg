<svg xmlns="http://www.w3.org/2000/svg" width="280" height="520" viewBox="0 0 280 520">
  <defs>
    <style>
      text { font-family: 'Inter', 'Noto Sans', sans-serif; }
      .sidebar-bg { fill: #232629; }
      .text-primary { fill: #eff0f1; font-size: 13px; }
      .text-dim { fill: #7f8c8d; font-size: 13px; }
      .text-active { fill: #3daee9; font-size: 13px; font-weight: 600; }
      .icon { fill: #bdc3c7; }
      .divider { stroke: #31363b; stroke-width: 1; }
      .back-bg { fill: #2a2e32; }
    </style>
  </defs>

  <rect class="sidebar-bg" width="280" height="520" rx="10"/>

  <!-- Back button -->
  <rect class="back-bg" x="4" y="12" width="272" height="40" rx="6"/>
  <text x="20" y="36" fill="#3daee9" font-size="16" font-family="Inter, sans-serif">&#x2039;</text>
  <text x="36" y="37" fill="#3daee9" font-size="13" font-weight="600" font-family="Inter, sans-serif">Animations</text>

  <!-- General (active) -->
  <rect x="4" y="62" width="272" height="40" rx="6" fill="#3daee9" opacity="0.12"/>
  <g transform="translate(20, 74)">
    <circle cx="9" cy="9" r="7" fill="none" stroke="#3daee9" stroke-width="1.2"/>
    <circle cx="9" cy="4" r="1.5" fill="#3daee9"/>
    <circle cx="4" cy="13" r="1.5" fill="#3daee9"/>
    <circle cx="14" cy="13" r="1.5" fill="#3daee9"/>
  </g>
  <text class="text-active" x="48" y="87">General</text>

  <!-- Divider -->
  <line class="divider" x1="16" y1="106" x2="264" y2="106"/>

  <!-- Zone Snap -->
  <rect x="4" y="112" width="272" height="40" rx="6" opacity="0"/>
  <g transform="translate(20, 124)">
    <rect x="0" y="0" width="8" height="18" rx="1" fill="none" stroke="#bdc3c7" stroke-width="1.2"/>
    <rect x="10" y="0" width="8" height="18" rx="1" fill="none" stroke="#bdc3c7" stroke-width="1.2"/>
  </g>
  <text class="text-primary" x="48" y="137">Zone Snap</text>

  <!-- Fades -->
  <rect x="4" y="154" width="272" height="40" rx="6" opacity="0"/>
  <g transform="translate(20, 166)">
    <rect x="0" y="0" width="18" height="18" rx="2" fill="none" stroke="#bdc3c7" stroke-width="1.2" opacity="0.3"/>
    <rect x="0" y="0" width="18" height="18" rx="2" fill="none" stroke="#bdc3c7" stroke-width="1.2" opacity="0.7"/>
  </g>
  <text class="text-primary" x="48" y="179">Fades</text>

  <!-- Layout Switch -->
  <rect x="4" y="196" width="272" height="40" rx="6" opacity="0"/>
  <g transform="translate(20, 208)">
    <rect x="0" y="0" width="8" height="8" rx="1.5" fill="none" stroke="#bdc3c7" stroke-width="1.2"/>
    <rect x="10" y="0" width="8" height="8" rx="1.5" fill="none" stroke="#bdc3c7" stroke-width="1.2"/>
    <rect x="0" y="10" width="18" height="8" rx="1.5" fill="none" stroke="#bdc3c7" stroke-width="1.2"/>
  </g>
  <text class="text-primary" x="48" y="221">Layout Switch</text>

  <!-- Border -->
  <rect x="4" y="238" width="272" height="40" rx="6" opacity="0"/>
  <g transform="translate(20, 250)">
    <rect x="2" y="2" width="14" height="14" rx="2" fill="none" stroke="#bdc3c7" stroke-width="2"/>
  </g>
  <text class="text-primary" x="48" y="263">Border</text>

  <!-- Preview -->
  <rect x="4" y="280" width="272" height="40" rx="6" opacity="0"/>
  <g transform="translate(20, 292)">
    <circle cx="9" cy="9" r="8" fill="none" stroke="#bdc3c7" stroke-width="1.2"/>
    <polygon points="7,5 14,9 7,13" fill="#bdc3c7"/>
  </g>
  <text class="text-primary" x="48" y="305">Preview</text>

  <!-- Divider -->
  <line class="divider" x1="16" y1="324" x2="264" y2="324"/>

  <!-- Shaders -->
  <rect x="4" y="330" width="272" height="40" rx="6" opacity="0"/>
  <g transform="translate(20, 342)">
    <rect x="0" y="0" width="18" height="18" rx="2" fill="none" stroke="#bdc3c7" stroke-width="1.2"/>
    <path d="M3,15 L6,6 L9,12 L12,3 L15,10" fill="none" stroke="#bdc3c7" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text class="text-primary" x="48" y="355">Shaders</text>
  <rect x="100" y="344" width="52" height="16" rx="4" fill="#f39c12" opacity="0.15"/>
  <text x="109" y="355" fill="#f39c12" font-size="9" font-weight="600" font-family="Inter, sans-serif">Phase 2</text>

  <!-- Bottom label -->
  <text x="140" y="490" text-anchor="middle" fill="#4d5357" font-size="10" font-family="Inter, sans-serif">Animations Drilldown</text>
</svg>