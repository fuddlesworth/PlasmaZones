<svg xmlns="http://www.w3.org/2000/svg" width="280" height="620" viewBox="0 0 280 620">
  <defs>
    <style>
      text { font-family: 'Inter', 'Noto Sans', sans-serif; }
      .bg { fill: #1b1e20; }
      .sidebar-bg { fill: #232629; }
      .item-hover { fill: #2a2e32; }
      .item-active { fill: #3daee9; opacity: 0.15; }
      .text-primary { fill: #eff0f1; font-size: 13px; }
      .text-secondary { fill: #7f8c8d; font-size: 11px; }
      .text-active { fill: #3daee9; font-size: 13px; font-weight: 600; }
      .icon { fill: #bdc3c7; }
      .icon-active { fill: #3daee9; }
      .divider { stroke: #31363b; stroke-width: 1; }
      .arrow { fill: #7f8c8d; font-size: 14px; }
      .search-bg { fill: #2a2e32; rx: 6; }
      .search-text { fill: #7f8c8d; font-size: 12px; }
      .badge { fill: #3daee9; font-size: 9px; font-weight: 700; }
      .badge-bg { fill: #3daee9; opacity: 0.15; rx: 3; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="280" height="620" rx="10"/>
  <rect class="sidebar-bg" x="0" y="0" width="280" height="620" rx="10"/>

  <!-- Search bar -->
  <rect class="search-bg" x="12" y="12" width="256" height="34" rx="6"/>
  <text class="search-text" x="38" y="33">Search settings...</text>
  <!-- Search icon -->
  <g transform="translate(20, 22)" class="icon">
    <circle cx="5" cy="5" r="4.5" fill="none" stroke="#7f8c8d" stroke-width="1.5"/>
    <line x1="8" y1="8" x2="11" y2="11" stroke="#7f8c8d" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Overview -->
  <rect class="item-hover" x="4" y="56" width="272" height="40" rx="6" opacity="0"/>
  <g transform="translate(20, 68)">
    <rect x="0" y="0" width="18" height="18" rx="2" fill="none" stroke="#bdc3c7" stroke-width="1.2"/>
    <rect x="3" y="3" width="12" height="8" rx="1" fill="none" stroke="#bdc3c7" stroke-width="1"/>
  </g>
  <text class="text-primary" x="48" y="81">Overview</text>

  <!-- Divider -->
  <line class="divider" x1="16" y1="100" x2="264" y2="100"/>

  <!-- Layouts -->
  <rect class="item-hover" x="4" y="106" width="272" height="40" rx="6" opacity="0"/>
  <g transform="translate(20, 118)">
    <rect x="0" y="0" width="8" height="8" rx="1.5" fill="none" stroke="#bdc3c7" stroke-width="1.2"/>
    <rect x="10" y="0" width="8" height="8" rx="1.5" fill="none" stroke="#bdc3c7" stroke-width="1.2"/>
    <rect x="0" y="10" width="8" height="8" rx="1.5" fill="none" stroke="#bdc3c7" stroke-width="1.2"/>
    <rect x="10" y="10" width="8" height="8" rx="1.5" fill="none" stroke="#bdc3c7" stroke-width="1.2"/>
  </g>
  <text class="text-primary" x="48" y="131">Layouts</text>

  <!-- Snapping -->
  <rect class="item-hover" x="4" y="148" width="272" height="40" rx="6" opacity="0"/>
  <g transform="translate(20, 160)">
    <rect x="0" y="0" width="8" height="18" rx="1" fill="none" stroke="#bdc3c7" stroke-width="1.2"/>
    <rect x="10" y="0" width="8" height="18" rx="1" fill="none" stroke="#bdc3c7" stroke-width="1.2"/>
  </g>
  <text class="text-primary" x="48" y="173">Snapping</text>
  <text class="arrow" x="252" y="174">&#x203A;</text>

  <!-- Tiling -->
  <rect class="item-hover" x="4" y="190" width="272" height="40" rx="6" opacity="0"/>
  <g transform="translate(20, 202)">
    <rect x="0" y="0" width="18" height="18" rx="2" fill="none" stroke="#bdc3c7" stroke-width="1.2"/>
    <rect x="0" y="0" width="8" height="18" rx="1" fill="none" stroke="#bdc3c7" stroke-width="0.8"/>
  </g>
  <text class="text-primary" x="48" y="215">Tiling</text>
  <text class="arrow" x="252" y="216">&#x203A;</text>

  <!-- Divider -->
  <line class="divider" x1="16" y1="234" x2="264" y2="234"/>

  <!-- ANIMATIONS (highlighted - NEW) -->
  <rect x="4" y="240" width="272" height="40" rx="6" fill="#3daee9" opacity="0.12"/>
  <g transform="translate(20, 252)">
    <!-- Play icon -->
    <polygon points="2,0 18,9 2,18" fill="#3daee9" stroke="none"/>
  </g>
  <text class="text-active" x="48" y="265">Animations</text>
  <text x="252" y="266" fill="#3daee9" font-size="14" font-family="Inter, sans-serif">&#x203A;</text>
  <!-- NEW badge -->
  <rect x="115" y="254" width="32" height="16" rx="4" fill="#3daee9" opacity="0.2"/>
  <text x="122" y="265" fill="#3daee9" font-size="9" font-weight="700" font-family="Inter, sans-serif">NEW</text>

  <!-- Divider -->
  <line class="divider" x1="16" y1="284" x2="264" y2="284"/>

  <!-- Exclusions -->
  <rect class="item-hover" x="4" y="290" width="272" height="40" rx="6" opacity="0"/>
  <g transform="translate(20, 302)">
    <circle cx="9" cy="9" r="8" fill="none" stroke="#bdc3c7" stroke-width="1.2"/>
    <line x1="4" y1="4" x2="14" y2="14" stroke="#bdc3c7" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  <text class="text-primary" x="48" y="315">Exclusions</text>

  <!-- Editor -->
  <rect class="item-hover" x="4" y="332" width="272" height="40" rx="6" opacity="0"/>
  <g transform="translate(20, 344)">
    <rect x="0" y="0" width="18" height="18" rx="2" fill="none" stroke="#bdc3c7" stroke-width="1.2"/>
    <path d="M4,14 L8,4 L12,14" fill="none" stroke="#bdc3c7" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text class="text-primary" x="48" y="357">Editor</text>

  <!-- General -->
  <rect class="item-hover" x="4" y="374" width="272" height="40" rx="6" opacity="0"/>
  <g transform="translate(20, 386)">
    <circle cx="9" cy="9" r="7" fill="none" stroke="#bdc3c7" stroke-width="1.2"/>
    <circle cx="9" cy="4" r="1.5" fill="#bdc3c7"/>
    <circle cx="4" cy="13" r="1.5" fill="#bdc3c7"/>
    <circle cx="14" cy="13" r="1.5" fill="#bdc3c7"/>
  </g>
  <text class="text-primary" x="48" y="399">General</text>

  <!-- About -->
  <rect class="item-hover" x="4" y="416" width="272" height="40" rx="6" opacity="0"/>
  <g transform="translate(20, 428)">
    <circle cx="9" cy="9" r="8" fill="none" stroke="#bdc3c7" stroke-width="1.2"/>
    <text x="6" y="14" fill="#bdc3c7" font-size="12" font-weight="700" font-family="Inter, sans-serif">?</text>
  </g>
  <text class="text-primary" x="48" y="441">About</text>

  <!-- Bottom label -->
  <text x="140" y="590" text-anchor="middle" fill="#4d5357" font-size="10" font-family="Inter, sans-serif">Main Sidebar</text>
</svg>