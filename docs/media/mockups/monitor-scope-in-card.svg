<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="wp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1730"/>
      <stop offset=".55" stop-color="#070F22"/>
      <stop offset="1" stop-color="#050916"/>
    </linearGradient>
    <filter id="ambient" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="70"/></filter>
    <symbol id="i-all" viewBox="0 0 20 18">
      <rect x="4" y="1" width="14" height="9" rx="1.6" fill="none" stroke="currentColor" stroke-width="1.4"/>
      <rect x="1" y="5" width="14" height="9" rx="1.6" fill="#0B1730" stroke="currentColor" stroke-width="1.4"/>
    </symbol>
  </defs>

  <rect width="1280" height="720" fill="url(#wp)"/>
  <g opacity=".28" filter="url(#ambient)">
    <circle cx="60" cy="80" r="170" fill="#22D3EE"/>
    <circle cx="1240" cy="700" r="190" fill="#A855F7"/>
  </g>

  <!-- ── Default state: chip in the card header, collapsed to All Monitors ── -->
  <text x="160" y="52" fill="#94A3B8" font-size="11" letter-spacing="1.5">DEFAULT — NO BLOCK ABOVE THE CARD</text>

  <g>
    <rect x="160" y="66" width="960" height="158" rx="12" fill="#101A36" stroke="#1E293B"/>
    <!-- header -->
    <text x="184" y="100" fill="#E6EDFF" font-size="14" font-weight="700">Gaps</text>
    <!-- scope chip, right-aligned in the header -->
    <g transform="translate(916 80)">
      <rect width="180" height="30" rx="15" fill="#0B1730" stroke="#1E293B"/>
      <g transform="translate(14 7)" color="#94A3B8"><use href="#i-all" width="18" height="16"/></g>
      <text x="40" y="20" fill="#E6EDFF" font-size="12">All Monitors</text>
      <path d="M 158 13 l 5 5 l 5 -5" fill="none" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <line x1="176" y1="120" x2="1104" y2="120" stroke="#1E293B" opacity=".6"/>
    <!-- rows -->
    <g font-size="13">
      <text x="184" y="150" fill="#E6EDFF" font-weight="600">Inner gap</text>
      <text x="184" y="166" fill="#94A3B8" font-size="11">Space between tiled windows</text>
      <g transform="translate(1024 134)"><rect width="64" height="30" rx="8" fill="#070F22" stroke="#1E293B"/><text x="20" y="20" fill="#E6EDFF">8</text></g>
      <line x1="176" y1="180" x2="1104" y2="180" stroke="#1E293B" opacity=".35"/>
      <text x="184" y="208" fill="#E6EDFF" font-weight="600">Smart gaps</text>
      <g transform="translate(1048 194)"><rect width="44" height="24" rx="12" fill="#3B82F6"/><circle cx="31" cy="12" r="9" fill="#F0F9FF"/></g>
    </g>
  </g>
  <text x="160" y="250" fill="#94A3B8" font-size="11">Scope is part of the card chrome. Collapsed to “All Monitors” it reads as a normal global card; only the chip hints it can scope.</text>

  <!-- ── Two ways to switch ── -->
  <text x="160" y="298" fill="#94A3B8" font-size="11" letter-spacing="1.5">SWITCH BY… (pick one)</text>

  <!-- A: dropdown -->
  <g>
    <rect x="160" y="314" width="440" height="250" rx="12" fill="#0B1730" stroke="#22D3EE" opacity=".5"/>
    <text x="180" y="340" fill="#22D3EE" font-size="12" font-weight="700">A · Dropdown</text>

    <!-- chip (open) -->
    <g transform="translate(360 332)">
      <rect width="180" height="30" rx="15" fill="#070F22" stroke="#3B82F6"/>
      <g transform="translate(14 7)" color="#3B82F6"><use href="#i-all" width="18" height="16"/></g>
      <text x="40" y="20" fill="#E6EDFF" font-size="12">All Monitors</text>
      <path d="M 158 16 l 5 -5 l 5 5" fill="none" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <!-- menu -->
    <g transform="translate(360 368)">
      <rect width="180" height="148" rx="10" fill="#101A36" stroke="#1E293B"/>
      <rect x="6" y="6" width="168" height="32" rx="7" fill="#3B82F6" opacity=".16"/>
      <text x="18" y="27" fill="#E6EDFF" font-size="12" font-weight="600">All Monitors</text>
      <text x="160" y="27" fill="#3B82F6" font-size="13">✓</text>
      <g transform="translate(0 44)">
        <text x="18" y="20" fill="#E6EDFF" font-size="12">DP‑2</text>
        <text x="48" y="20" fill="#34D399" font-size="10">Primary</text>
        <circle cx="160" cy="16" r="4" fill="#22D3EE"/>
      </g>
      <g transform="translate(0 80)">
        <text x="18" y="20" fill="#E6EDFF" font-size="12">DP‑3</text>
        <text x="150" y="20" fill="#475569" font-size="10">—</text>
      </g>
    </g>
    <text x="180" y="548" fill="#94A3B8" font-size="10.5">Familiar, tiny, fully collapses. Loses spatial layout.</text>
  </g>

  <!-- B: spatial popover -->
  <g>
    <rect x="680" y="314" width="440" height="250" rx="12" fill="#0B1730" stroke="#A855F7" opacity=".5"/>
    <text x="700" y="340" fill="#A855F7" font-size="12" font-weight="700">B · Spatial popover</text>

    <g transform="translate(880 332)">
      <rect width="180" height="30" rx="15" fill="#070F22" stroke="#3B82F6"/>
      <g transform="translate(14 7)" color="#3B82F6"><use href="#i-all" width="18" height="16"/></g>
      <text x="40" y="20" fill="#E6EDFF" font-size="12">All Monitors</text>
      <path d="M 158 16 l 5 -5 l 5 5" fill="none" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <!-- popover with mini map -->
    <g transform="translate(720 368)">
      <rect width="360" height="148" rx="10" fill="#101A36" stroke="#1E293B"/>
      <!-- All pill -->
      <g transform="translate(16 16)">
        <rect width="70" height="116" rx="8" fill="#0B1730" stroke="#1E293B"/>
        <g transform="translate(26 38)" color="#94A3B8"><use href="#i-all" width="18" height="16"/></g>
        <text x="35" y="74" text-anchor="middle" fill="#94A3B8" font-size="10">All</text>
      </g>
      <line x1="98" y1="22" x2="98" y2="126" stroke="#1E293B"/>
      <!-- proportional map: DP-2 (selected look) + DP-3 -->
      <g transform="translate(116 40)">
        <rect x="-3" y="-3" width="116" height="74" rx="9" fill="#3B82F6" opacity=".22"/>
        <rect width="110" height="68" rx="7" fill="#101A36" stroke="#3B82F6" stroke-width="2"/>
        <text x="55" y="32" text-anchor="middle" fill="#E6EDFF" font-size="12" font-weight="700">DP‑2</text>
        <text x="55" y="48" text-anchor="middle" fill="#34D399" font-size="9">Primary</text>
        <circle cx="98" cy="12" r="4.5" fill="#22D3EE"/>
      </g>
      <g transform="translate(232 40)">
        <rect width="110" height="68" rx="7" fill="#101A36" stroke="#1E293B"/>
        <text x="55" y="38" text-anchor="middle" fill="#94A3B8" font-size="12" font-weight="600">DP‑3</text>
      </g>
    </g>
    <text x="700" y="548" fill="#94A3B8" font-size="10.5">Keeps the spatial map (tells identical panels apart), hidden until you switch.</text>
  </g>

  <!-- selected-state note -->
  <g transform="translate(160 588)">
    <rect width="960" height="46" rx="10" fill="#070F22" stroke="#3B82F6" opacity=".9"/>
    <text x="16" y="20" fill="#3B82F6" font-size="11" font-weight="700">When a monitor is picked</text>
    <text x="16" y="37" fill="#94A3B8" font-size="11">the chip shows “DP‑2 ●” with an override dot and a small reset; the card body switches to that monitor’s values. Still one shared pick across pages.</text>
  </g>

  <text x="640" y="664" text-anchor="middle" fill="#E6EDFF" font-size="13" font-weight="600">
    Per-monitor scope folded into the card header — collapsed to All Monitors by default
  </text>
  <text x="640" y="684" text-anchor="middle" fill="#94A3B8" font-size="10" opacity=".7">
    No selector block above the card · Theme: phosphor‑works.github.io/palette
  </text>
</svg>
