<svg xmlns="http://www.w3.org/2000/svg" width="540" height="560" viewBox="0 0 540 560">
  <defs>
    <style>
      text { font-family: 'Inter', 'Noto Sans', sans-serif; }
    </style>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Dimmed background (simulating overlay) -->
  <rect width="540" height="560" fill="#0a0c0e" opacity="0.85" rx="12"/>

  <!-- Dialog window -->
  <rect x="20" y="16" width="500" height="528" rx="12" fill="#232629" filter="url(#shadow)"/>

  <!-- Dialog titlebar -->
  <rect x="20" y="16" width="500" height="42" rx="12" fill="#2a2e32"/>
  <rect x="20" y="38" width="500" height="20" fill="#2a2e32"/>
  <text x="40" y="43" fill="#eff0f1" font-size="13" font-weight="600" font-family="Inter, sans-serif">Customize Curve — Zone Snap Out</text>
  <!-- Close button -->
  <circle cx="496" cy="37" r="10" fill="#3d4349"/>
  <text x="492" y="41" fill="#bdc3c7" font-size="12" font-family="Inter, sans-serif">&#x2715;</text>

  <!-- ============================================================ -->
  <!-- FULL EASING PREVIEW (drag handles) -->
  <!-- ============================================================ -->
  <rect x="50" y="72" width="440" height="190" rx="8" fill="#1b1e20"/>

  <!-- Grid -->
  <line x1="78" y1="84" x2="78" y2="236" stroke="#2a2e32" stroke-width="0.5"/>
  <line x1="156" y1="84" x2="156" y2="236" stroke="#2a2e32" stroke-width="0.5"/>
  <line x1="234" y1="84" x2="234" y2="236" stroke="#2a2e32" stroke-width="0.5"/>
  <line x1="312" y1="84" x2="312" y2="236" stroke="#2a2e32" stroke-width="0.5"/>
  <line x1="390" y1="84" x2="390" y2="236" stroke="#2a2e32" stroke-width="0.5"/>
  <line x1="78" y1="122" x2="462" y2="122" stroke="#2a2e32" stroke-width="0.5"/>
  <line x1="78" y1="160" x2="462" y2="160" stroke="#2a2e32" stroke-width="0.5"/>
  <line x1="78" y1="198" x2="462" y2="198" stroke="#2a2e32" stroke-width="0.5"/>

  <!-- Axis labels -->
  <text x="66" y="88" fill="#4d5357" font-size="8" text-anchor="end" font-family="Inter, sans-serif">1.0</text>
  <text x="66" y="164" fill="#4d5357" font-size="8" text-anchor="end" font-family="Inter, sans-serif">0.5</text>
  <text x="66" y="240" fill="#4d5357" font-size="8" text-anchor="end" font-family="Inter, sans-serif">0.0</text>

  <!-- Bezier curve (Snappy Quart ease-out) -->
  <path d="M78,236 C156,236 234,84 462,84" fill="none" stroke="#3daee9" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Control handle lines -->
  <line x1="78" y1="236" x2="156" y2="236" stroke="#3daee9" stroke-width="1" opacity="0.4"/>
  <line x1="462" y1="84" x2="234" y2="84" stroke="#3daee9" stroke-width="1" opacity="0.4"/>

  <!-- Drag handles -->
  <circle cx="156" cy="236" r="7" fill="#3daee9"/>
  <circle cx="156" cy="236" r="3.5" fill="#1b1e20"/>
  <circle cx="234" cy="84" r="7" fill="#3daee9"/>
  <circle cx="234" cy="84" r="3.5" fill="#1b1e20"/>

  <!-- Animated box track -->
  <rect x="78" y="248" width="384" height="10" rx="4" fill="#2a2e32"/>
  <rect x="260" y="247" width="16" height="12" rx="3" fill="#3daee9"/>

  <!-- ============================================================ -->
  <!-- EASING SETTINGS -->
  <!-- ============================================================ -->
  <line x1="40" y1="278" x2="500" y2="278" stroke="#31363b" stroke-width="1"/>

  <!-- Style -->
  <text x="50" y="306" fill="#eff0f1" font-size="12" font-family="Inter, sans-serif">Style</text>
  <text x="50" y="320" fill="#7f8c8d" font-size="10" font-family="Inter, sans-serif">Animation curve style</text>
  <rect x="360" y="294" width="150" height="30" rx="6" fill="#31363b"/>
  <text x="376" y="314" fill="#eff0f1" font-size="11" font-weight="500" font-family="Inter, sans-serif">Snappy (Quart)</text>
  <text x="490" y="314" fill="#7f8c8d" font-size="10" font-family="Inter, sans-serif">&#x25BE;</text>

  <line x1="40" y1="336" x2="500" y2="336" stroke="#31363b" stroke-width="1"/>

  <!-- Direction -->
  <text x="50" y="364" fill="#eff0f1" font-size="12" font-family="Inter, sans-serif">Direction</text>
  <text x="50" y="378" fill="#7f8c8d" font-size="10" font-family="Inter, sans-serif">Ease In / Ease Out / In-Out</text>
  <rect x="360" y="352" width="150" height="30" rx="6" fill="#31363b"/>
  <text x="376" y="372" fill="#eff0f1" font-size="11" font-weight="500" font-family="Inter, sans-serif">Ease Out</text>
  <text x="490" y="372" fill="#7f8c8d" font-size="10" font-family="Inter, sans-serif">&#x25BE;</text>

  <line x1="40" y1="394" x2="500" y2="394" stroke="#31363b" stroke-width="1"/>

  <!-- Amplitude (dimmed - not elastic) -->
  <g opacity="0.3">
    <text x="50" y="422" fill="#eff0f1" font-size="12" font-family="Inter, sans-serif">Amplitude</text>
    <text x="50" y="436" fill="#7f8c8d" font-size="10" font-family="Inter, sans-serif">Only for elastic / bounce curves</text>
    <rect x="360" y="414" width="140" height="5" rx="2.5" fill="#3d4349"/>
    <circle cx="430" cy="416" r="6" fill="#eff0f1"/>
    <text x="516" y="422" fill="#eff0f1" font-size="11" font-family="Inter, sans-serif">1.0</text>
  </g>

  <line x1="40" y1="452" x2="500" y2="452" stroke="#31363b" stroke-width="1"/>

  <!-- Period (dimmed - not elastic) -->
  <g opacity="0.3">
    <text x="50" y="480" fill="#eff0f1" font-size="12" font-family="Inter, sans-serif">Period</text>
    <text x="50" y="494" fill="#7f8c8d" font-size="10" font-family="Inter, sans-serif">Only for elastic curves</text>
    <rect x="360" y="472" width="140" height="5" rx="2.5" fill="#3d4349"/>
    <circle cx="402" cy="474" r="6" fill="#eff0f1"/>
    <text x="516" y="480" fill="#eff0f1" font-size="11" font-family="Inter, sans-serif">0.30</text>
  </g>

  <!-- ============================================================ -->
  <!-- DIALOG FOOTER -->
  <!-- ============================================================ -->
  <line x1="20" y1="510" x2="520" y2="510" stroke="#31363b" stroke-width="1"/>

  <!-- Cancel button -->
  <rect x="350" y="520" width="76" height="32" rx="6" fill="#31363b"/>
  <text x="372" y="540" fill="#bdc3c7" font-size="12" font-family="Inter, sans-serif">Cancel</text>

  <!-- Apply button -->
  <rect x="434" y="520" width="76" height="32" rx="6" fill="#3daee9"/>
  <text x="457" y="540" fill="#ffffff" font-size="12" font-weight="600" font-family="Inter, sans-serif">Apply</text>
</svg>