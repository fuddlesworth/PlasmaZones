<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="wp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1730"/>
      <stop offset=".55" stop-color="#070F22"/>
      <stop offset="1" stop-color="#050916"/>
    </linearGradient>
    <filter id="ambient" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="70"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <!-- per-monitor "pip" used in the sidebar to mark per-monitor-aware pages -->
    <symbol id="i-pip" viewBox="0 0 14 14">
      <rect x="1" y="2" width="12" height="8" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.3"/>
      <line x1="5" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
    </symbol>
    <!-- "all monitors" stacked-screens glyph -->
    <symbol id="i-all" viewBox="0 0 20 18">
      <rect x="4" y="1" width="14" height="9" rx="1.6" fill="none" stroke="currentColor" stroke-width="1.4"/>
      <rect x="1" y="5" width="14" height="9" rx="1.6" fill="#0B1730" stroke="currentColor" stroke-width="1.4"/>
    </symbol>
  </defs>

  <!-- backdrop -->
  <rect width="1280" height="720" fill="url(#wp)"/>
  <g opacity=".30" filter="url(#ambient)">
    <circle cx="60" cy="80" r="180" fill="#22D3EE"/>
    <circle cx="1240" cy="700" r="200" fill="#A855F7"/>
  </g>

  <!-- ─────────────────────── App window ─────────────────────── -->
  <rect x="40" y="36" width="1200" height="580" rx="16" fill="#070F22" stroke="#1E293B"/>
  <!-- content panel (right corners rounded, left edge meets sidebar) -->
  <path d="M 276 36 H 1224 A 16 16 0 0 1 1240 52 V 600 A 16 16 0 0 1 1224 616 H 276 Z" fill="#0B1730"/>
  <line x1="276" y1="36" x2="276" y2="616" stroke="#1E293B"/>

  <!-- ─── Sidebar ─── -->
  <g transform="translate(64 70)">
    <rect x="-2" y="-14" width="22" height="22" rx="6" fill="#3B82F6"/>
    <rect x="3" y="-9" width="12" height="12" rx="3" fill="#22D3EE" opacity=".9"/>
    <text x="32" y="3" fill="#E6EDFF" font-size="15" font-weight="700">PlasmaZones</text>
  </g>
  <g transform="translate(56 116)" font-size="12.5">
    <!-- Layouts -->
    <g transform="translate(0 0)">
      <text x="16" y="20" fill="#94A3B8">Layouts</text>
    </g>
    <!-- Tiling · Appearance (selected, per-monitor) -->
    <g transform="translate(0 36)">
      <rect x="-4" y="0" width="208" height="32" rx="9" fill="#3B82F6"/>
      <text x="16" y="21" fill="#F0F9FF" font-weight="600">Tiling · Appearance</text>
      <g transform="translate(182 9)" color="#F0F9FF" opacity=".9"><use href="#i-pip" width="14" height="14"/></g>
    </g>
    <!-- Tiling · Algorithm (per-monitor) -->
    <g transform="translate(0 76)">
      <text x="16" y="20" fill="#94A3B8">Tiling · Algorithm</text>
      <g transform="translate(182 5)" color="#3B82F6"><use href="#i-pip" width="14" height="14"/></g>
    </g>
    <!-- Snapping · Appearance (per-monitor) -->
    <g transform="translate(0 112)">
      <text x="16" y="20" fill="#94A3B8">Snapping · Appearance</text>
      <g transform="translate(182 5)" color="#3B82F6"><use href="#i-pip" width="14" height="14"/></g>
    </g>
    <!-- Monitors / Virtual screens (per-monitor) -->
    <g transform="translate(0 148)">
      <text x="16" y="20" fill="#94A3B8">Virtual Screens</text>
      <g transform="translate(182 5)" color="#3B82F6"><use href="#i-pip" width="14" height="14"/></g>
    </g>
    <!-- non per-monitor pages -->
    <g transform="translate(0 184)"><text x="16" y="20" fill="#94A3B8">Shortcuts</text></g>
    <g transform="translate(0 220)"><text x="16" y="20" fill="#94A3B8">General</text></g>

    <!-- legend for the pip -->
    <g transform="translate(0 372)" font-size="10.5">
      <g transform="translate(0 -2)" color="#3B82F6"><use href="#i-pip" width="14" height="14"/></g>
      <text x="22" y="9" fill="#94A3B8">= shows the scope band</text>
    </g>
  </g>

  <!-- ─────────────── Persistent scope band ─────────────── -->
  <!-- Pinned at the top of the content area; identical on every per-monitor page. -->
  <g>
    <rect x="276" y="36" width="964" height="146" fill="#070F22"/>
    <path d="M 1224 36 A 16 16 0 0 1 1240 52 V 36 Z" fill="#070F22"/>
    <line x1="276" y1="182" x2="1240" y2="182" stroke="#1E293B" stroke-width="1.5"/>

    <text x="304" y="68" fill="#94A3B8" font-size="10.5" letter-spacing="1.5">SCOPE</text>

    <!-- "All Monitors" chip (resting default; unselected here because DP-2 is active) -->
    <g transform="translate(304 84)">
      <rect width="150" height="74" rx="12" fill="#101A36" stroke="#1E293B"/>
      <g transform="translate(20 22)" color="#94A3B8"><use href="#i-all" width="20" height="18"/></g>
      <text x="52" y="35" fill="#94A3B8" font-size="12.5" font-weight="600">All</text>
      <text x="52" y="52" fill="#94A3B8" font-size="11">Monitors</text>
    </g>

    <!-- divider between "all" and the physical map -->
    <line x1="478" y1="92" x2="478" y2="150" stroke="#1E293B"/>

    <!-- ── Proportional display map (real arrangement: DP-2 | DP-3, both 3200×1800) ── -->
    <g transform="translate(506 86)">
      <!-- selection halo behind DP-2 -->
      <rect x="-5" y="-5" width="138" height="80" rx="12" fill="#3B82F6" opacity=".28" filter="url(#glow)"/>

      <!-- DP-2 : SELECTED + has overrides + primary -->
      <g>
        <rect width="128" height="70" rx="9" fill="#101A36" stroke="#3B82F6" stroke-width="2"/>
        <rect width="128" height="70" rx="9" fill="#3B82F6" opacity=".10"/>
        <text x="64" y="33" text-anchor="middle" fill="#E6EDFF" font-size="14" font-weight="700">DP‑2</text>
        <!-- primary badge -->
        <g transform="translate(40 42)">
          <rect width="48" height="18" rx="9" fill="#10B981" opacity=".18"/>
          <text x="24" y="13" text-anchor="middle" fill="#34D399" font-size="10" font-weight="600">Primary</text>
        </g>
        <!-- override marker -->
        <circle cx="114" cy="14" r="5.5" fill="#22D3EE" stroke="#070F22" stroke-width="1.5"/>
      </g>

      <!-- DP-3 : unselected, no overrides -->
      <g transform="translate(140 0)">
        <rect width="128" height="70" rx="9" fill="#101A36" stroke="#1E293B"/>
        <text x="64" y="33" text-anchor="middle" fill="#94A3B8" font-size="14" font-weight="600">DP‑3</text>
        <text x="64" y="52" text-anchor="middle" fill="#475569" font-size="10">no overrides</text>
      </g>
    </g>

    <!-- right side: live status for the selected scope + reset -->
    <g transform="translate(980 92)">
      <circle cx="6" cy="22" r="5" fill="#22D3EE"/>
      <text x="20" y="20" fill="#E6EDFF" font-size="12" font-weight="600">Custom settings</text>
      <text x="20" y="37" fill="#94A3B8" font-size="11">for DP‑2 · LG Ultra HD</text>
      <g transform="translate(0 50)">
        <rect width="116" height="30" rx="9" fill="#101A36" stroke="#1E293B"/>
        <text x="58" y="20" text-anchor="middle" fill="#94A3B8" font-size="11.5">↺  Reset</text>
      </g>
    </g>
  </g>

  <!-- ─────────────── Page content (scoped to DP-2) ─────────────── -->
  <g transform="translate(304 216)">
    <text x="0" y="0" fill="#E6EDFF" font-size="14" font-weight="700">Gaps</text>
    <text x="46" y="0" fill="#3B82F6" font-size="11">· editing DP‑2</text>
    <line x1="0" y1="14" x2="912" y2="14" stroke="#1E293B" opacity=".6"/>

    <!-- row: Inner gap -->
    <g transform="translate(0 30)">
      <text x="0" y="16" fill="#E6EDFF" font-size="13" font-weight="600">Inner gap</text>
      <text x="0" y="33" fill="#94A3B8" font-size="11">Space between tiled windows</text>
      <g transform="translate(836 0)">
        <rect width="76" height="34" rx="8" fill="#070F22" stroke="#1E293B"/>
        <text x="22" y="22" fill="#E6EDFF" font-size="13">8</text>
        <path d="M 54 13 l 5 -5 l 5 5" fill="none" stroke="#94A3B8" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M 54 22 l 5 5 l 5 -5" fill="none" stroke="#94A3B8" stroke-width="1.4" stroke-linecap="round"/>
      </g>
    </g>
    <line x1="0" y1="78" x2="912" y2="78" stroke="#1E293B" opacity=".4"/>

    <!-- row: Outer gap -->
    <g transform="translate(0 92)">
      <text x="0" y="16" fill="#E6EDFF" font-size="13" font-weight="600">Outer gap</text>
      <text x="0" y="33" fill="#94A3B8" font-size="11">Space from screen edges to tiled windows</text>
      <g transform="translate(836 0)">
        <rect width="76" height="34" rx="8" fill="#070F22" stroke="#1E293B"/>
        <text x="22" y="22" fill="#E6EDFF" font-size="13">8</text>
        <path d="M 54 13 l 5 -5 l 5 5" fill="none" stroke="#94A3B8" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M 54 22 l 5 5 l 5 -5" fill="none" stroke="#94A3B8" stroke-width="1.4" stroke-linecap="round"/>
      </g>
    </g>
    <line x1="0" y1="140" x2="912" y2="140" stroke="#1E293B" opacity=".4"/>

    <!-- row: Per-side outer gaps (toggle OFF) -->
    <g transform="translate(0 154)">
      <text x="0" y="16" fill="#E6EDFF" font-size="13" font-weight="600">Per‑side outer gaps</text>
      <text x="0" y="33" fill="#94A3B8" font-size="11">Use a single outer gap value for all edges</text>
      <g transform="translate(868 4)">
        <rect width="44" height="24" rx="12" fill="#1E293B"/>
        <circle cx="13" cy="12" r="9" fill="#94A3B8"/>
      </g>
    </g>
    <line x1="0" y1="202" x2="912" y2="202" stroke="#1E293B" opacity=".4"/>

    <!-- row: Smart gaps (toggle ON) -->
    <g transform="translate(0 216)">
      <text x="0" y="16" fill="#E6EDFF" font-size="13" font-weight="600">Smart gaps</text>
      <text x="0" y="33" fill="#94A3B8" font-size="11">Remove all gaps when only one window is tiled</text>
      <g transform="translate(868 4)">
        <rect width="44" height="24" rx="12" fill="#3B82F6"/>
        <circle cx="31" cy="12" r="9" fill="#F0F9FF"/>
      </g>
    </g>
  </g>

  <!-- ─────────────── Annotation callouts ─────────────── -->
  <g font-size="11">
    <!-- A: persistent band -->
    <line x1="430" y1="520" x2="430" y2="184" stroke="#3B82F6" stroke-dasharray="3 4" opacity=".5"/>
    <g transform="translate(304 520)">
      <rect width="280" height="78" rx="10" fill="#070F22" stroke="#3B82F6" opacity=".97"/>
      <text x="14" y="22" font-weight="700" fill="#3B82F6">Pinned scope band</text>
      <text x="14" y="40" fill="#94A3B8">Pick a monitor once; the band stays put</text>
      <text x="14" y="55" fill="#94A3B8">across every per‑monitor page. State lives</text>
      <text x="14" y="70" fill="#94A3B8">on the shared SettingsController.</text>
    </g>

    <!-- B: real geometry -->
    <line x1="640" y1="520" x2="600" y2="160" stroke="#22D3EE" stroke-dasharray="3 4" opacity=".5"/>
    <g transform="translate(600 520)">
      <rect width="280" height="78" rx="10" fill="#070F22" stroke="#22D3EE" opacity=".97"/>
      <text x="14" y="22" font-weight="700" fill="#22D3EE">Real arrangement</text>
      <text x="14" y="40" fill="#94A3B8">Rectangles drawn from actual output</text>
      <text x="14" y="55" fill="#94A3B8">geometry (x/y/w/h) — disambiguates two</text>
      <text x="14" y="70" fill="#94A3B8">identical panels by position, not a card row.</text>
    </g>

    <!-- C: override + connector-first -->
    <line x1="980" y1="520" x2="620" y2="100" stroke="#A855F7" stroke-dasharray="3 4" opacity=".4"/>
    <g transform="translate(896 520)">
      <rect width="288" height="78" rx="10" fill="#070F22" stroke="#A855F7" opacity=".97"/>
      <text x="14" y="22" font-weight="700" fill="#A855F7">Override‑aware · connector‑first</text>
      <text x="14" y="40" fill="#94A3B8">Cyan dot marks every monitor with custom</text>
      <text x="14" y="55" fill="#94A3B8">settings. Labels lead with DP‑2/DP‑3 (how</text>
      <text x="14" y="70" fill="#94A3B8">Hyprland/niri configs name outputs).</text>
    </g>
  </g>

  <!-- ─────────────── Captions ─────────────── -->
  <text x="640" y="648" text-anchor="middle" fill="#E6EDFF" font-size="14" font-weight="600">
    Phosphor settings · persistent per‑monitor scope band (default theme)
  </text>
  <text x="640" y="668" text-anchor="middle" fill="#94A3B8" font-size="11">
    Replaces the tall, repeated monitor‑card strip with one pinned, spatial scope map shared across every per‑monitor page.
  </text>
  <text x="640" y="686" text-anchor="middle" fill="#94A3B8" font-size="9" opacity=".7">
    Mockup · drawn QML rectangles (no SVG asset) · "All Monitors" is the resting default · Theme: phosphor‑works.github.io/palette
  </text>
</svg>
