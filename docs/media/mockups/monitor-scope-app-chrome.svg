<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="wp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1730"/>
      <stop offset=".55" stop-color="#070F22"/>
      <stop offset="1" stop-color="#050916"/>
    </linearGradient>
    <filter id="ambient" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="70"/></filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="5"/></filter>
    <symbol id="i-pip" viewBox="0 0 14 14">
      <rect x="1" y="2" width="12" height="8" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.3"/>
      <line x1="5" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
    </symbol>
    <symbol id="i-all" viewBox="0 0 20 18">
      <rect x="4" y="1" width="14" height="9" rx="1.6" fill="none" stroke="currentColor" stroke-width="1.4"/>
      <rect x="1" y="5" width="14" height="9" rx="1.6" fill="#0B1730" stroke="currentColor" stroke-width="1.4"/>
    </symbol>
    <!-- per-monitor capability marker (diamond) -->
    <symbol id="i-mark" viewBox="0 0 14 14">
      <path d="M 7 1 L 13 7 L 7 13 L 1 7 Z" fill="none" stroke="currentColor" stroke-width="1.5"/>
    </symbol>
  </defs>

  <rect width="1280" height="720" fill="url(#wp)"/>
  <g opacity=".30" filter="url(#ambient)">
    <circle cx="60" cy="80" r="180" fill="#22D3EE"/>
    <circle cx="1240" cy="700" r="200" fill="#A855F7"/>
  </g>

  <!-- window -->
  <rect x="40" y="36" width="1200" height="580" rx="16" fill="#070F22" stroke="#1E293B"/>
  <path d="M 276 36 H 1224 A 16 16 0 0 1 1240 52 V 600 A 16 16 0 0 1 1224 616 H 276 Z" fill="#0B1730"/>
  <line x1="276" y1="36" x2="276" y2="616" stroke="#1E293B"/>

  <!-- sidebar -->
  <g transform="translate(64 70)">
    <rect x="-2" y="-14" width="22" height="22" rx="6" fill="#3B82F6"/>
    <rect x="3" y="-9" width="12" height="12" rx="3" fill="#22D3EE" opacity=".9"/>
    <text x="32" y="3" fill="#E6EDFF" font-size="15" font-weight="700">PlasmaZones</text>
  </g>
  <g transform="translate(56 116)" font-size="12.5">
    <g transform="translate(0 0)"><text x="16" y="20" fill="#94A3B8">Layouts</text></g>
    <g transform="translate(0 36)">
      <rect x="-4" y="0" width="208" height="32" rx="9" fill="#3B82F6"/>
      <text x="16" y="21" fill="#F0F9FF" font-weight="600">Tiling · Appearance</text>
      <g transform="translate(182 9)" color="#F0F9FF" opacity=".9"><use href="#i-pip" width="14" height="14"/></g>
    </g>
    <g transform="translate(0 76)"><text x="16" y="20" fill="#94A3B8">Tiling · Algorithm</text>
      <g transform="translate(182 5)" color="#3B82F6"><use href="#i-pip" width="14" height="14"/></g></g>
    <g transform="translate(0 112)"><text x="16" y="20" fill="#94A3B8">Snapping · Appearance</text>
      <g transform="translate(182 5)" color="#3B82F6"><use href="#i-pip" width="14" height="14"/></g></g>
    <g transform="translate(0 148)"><text x="16" y="20" fill="#94A3B8">Virtual Screens</text>
      <g transform="translate(182 5)" color="#3B82F6"><use href="#i-pip" width="14" height="14"/></g></g>
    <g transform="translate(0 184)"><text x="16" y="20" fill="#94A3B8">Shortcuts</text></g>
    <g transform="translate(0 220)"><text x="16" y="20" fill="#94A3B8">General</text></g>
    <g transform="translate(0 372)" font-size="10.5">
      <g transform="translate(0 -3)" color="#3B82F6"><use href="#i-mark" width="13" height="13"/></g>
      <text x="22" y="9" fill="#94A3B8">= reacts to scope</text>
    </g>
  </g>

  <!-- ───────── persistent scope band (once for the app) ───────── -->
  <g>
    <rect x="276" y="36" width="964" height="120" fill="#070F22"/>
    <path d="M 1224 36 A 16 16 0 0 1 1240 52 V 36 Z" fill="#070F22"/>
    <line x1="276" y1="156" x2="1240" y2="156" stroke="#1E293B" stroke-width="1.5"/>

    <text x="304" y="66" fill="#94A3B8" font-size="10.5" letter-spacing="1.5">SCOPE</text>
    <g transform="translate(348 58)" color="#3B82F6"><use href="#i-mark" width="11" height="11"/></g>
    <text x="366" y="66" fill="#64748B" font-size="10.5">applies only to marked settings</text>

    <g transform="translate(304 78)">
      <rect width="116" height="58" rx="12" fill="#101A36" stroke="#1E293B"/>
      <g transform="translate(16 18)" color="#94A3B8"><use href="#i-all" width="20" height="18"/></g>
      <text x="46" y="27" fill="#94A3B8" font-size="12" font-weight="600">All</text>
      <text x="46" y="43" fill="#94A3B8" font-size="10.5">Monitors</text>
    </g>
    <line x1="434" y1="84" x2="434" y2="130" stroke="#1E293B"/>
    <g transform="translate(454 78)">
      <rect x="-4" y="-4" width="112" height="66" rx="11" fill="#3B82F6" opacity=".28" filter="url(#glow)"/>
      <rect width="104" height="58" rx="9" fill="#101A36" stroke="#3B82F6" stroke-width="2"/>
      <rect width="104" height="58" rx="9" fill="#3B82F6" opacity=".10"/>
      <text x="52" y="27" text-anchor="middle" fill="#E6EDFF" font-size="13" font-weight="700">DP‑2</text>
      <g transform="translate(30 35)"><rect width="44" height="16" rx="8" fill="#10B981" opacity=".18"/><text x="22" y="12" text-anchor="middle" fill="#34D399" font-size="9" font-weight="600">Primary</text></g>
      <circle cx="92" cy="12" r="5" fill="#22D3EE" stroke="#070F22" stroke-width="1.5"/>
    </g>
    <g transform="translate(570 78)">
      <rect width="104" height="58" rx="9" fill="#101A36" stroke="#1E293B"/>
      <text x="52" y="27" text-anchor="middle" fill="#94A3B8" font-size="13" font-weight="600">DP‑3</text>
      <text x="52" y="44" text-anchor="middle" fill="#475569" font-size="9.5">no overrides</text>
    </g>
    <g transform="translate(978 86)">
      <circle cx="6" cy="8" r="5" fill="#22D3EE"/>
      <text x="20" y="12" fill="#E6EDFF" font-size="11.5" font-weight="600">Editing DP‑2</text>
      <g transform="translate(0 24)"><rect width="116" height="30" rx="9" fill="#101A36" stroke="#1E293B"/><text x="58" y="20" text-anchor="middle" fill="#94A3B8" font-size="11.5">↺  Reset DP‑2</text></g>
    </g>
  </g>

  <!-- ───────── content ───────── -->
  <text x="304" y="190" fill="#E6EDFF" font-size="16" font-weight="700">Tiling · Appearance</text>

  <g font-size="13">
    <!-- global cards: no scope chrome -->
    <g><rect x="304" y="208" width="908" height="44" rx="12" fill="#101A36" stroke="#1E293B"/>
      <text x="324" y="235" fill="#E6EDFF" font-weight="600">Colors</text>
      <text x="1188" y="235" fill="#94A3B8">›</text></g>
    <g><rect x="304" y="260" width="908" height="44" rx="12" fill="#101A36" stroke="#1E293B"/>
      <text x="324" y="287" fill="#E6EDFF" font-weight="600">Decorations</text>
      <text x="1188" y="287" fill="#94A3B8">›</text></g>
    <g><rect x="304" y="312" width="908" height="108" rx="12" fill="#101A36" stroke="#1E293B"/>
      <text x="324" y="339" fill="#E6EDFF" font-weight="600">Borders</text>
      <line x1="320" y1="352" x2="1196" y2="352" stroke="#1E293B" opacity=".5"/>
      <text x="324" y="380" fill="#E6EDFF">Border width</text>
      <g transform="translate(1132 364)"><rect width="64" height="30" rx="8" fill="#070F22" stroke="#1E293B"/><text x="20" y="20" fill="#E6EDFF">2</text></g>
      <text x="324" y="408" fill="#E6EDFF">Corner radius <tspan fill="#94A3B8" font-size="11">(roundness)</tspan></text>
      <g transform="translate(1132 392)"><rect width="64" height="30" rx="8" fill="#070F22" stroke="#1E293B"/><text x="20" y="20" fill="#E6EDFF">8</text></g></g>

    <!-- Gaps: MARKED per-monitor card, reacts to the band -->
    <g>
      <rect x="304" y="428" width="908" height="152" rx="12" fill="#101A36" stroke="#3B82F6" stroke-width="1.5"/>
      <path d="M 304 442 A 14 14 0 0 1 318 428 V 580 A 14 14 0 0 1 304 566 Z" fill="#3B82F6"/>
      <g transform="translate(326 446)" color="#3B82F6"><use href="#i-mark" width="14" height="14"/></g>
      <text x="350" y="458" fill="#E6EDFF" font-weight="600">Gaps</text>
      <g transform="translate(404 444)"><rect width="138" height="20" rx="10" fill="#3B82F6" opacity=".16"/><text x="69" y="14" text-anchor="middle" fill="#3B82F6" font-size="10.5" font-weight="600">DP‑2 · overridden</text></g>
      <g transform="translate(1088 440)"><rect width="108" height="26" rx="9" fill="#0B1730" stroke="#1E293B"/><text x="54" y="18" text-anchor="middle" fill="#94A3B8" font-size="11">↺  Reset</text></g>
      <line x1="320" y1="474" x2="1196" y2="474" stroke="#1E293B" opacity=".5"/>
      <text x="326" y="502" fill="#E6EDFF" font-weight="600">Inner gap</text>
      <text x="326" y="518" fill="#94A3B8" font-size="11">Space between tiled windows</text>
      <g transform="translate(1132 490)"><rect width="64" height="30" rx="8" fill="#070F22" stroke="#1E293B"/><text x="20" y="20" fill="#E6EDFF">8</text></g>
      <line x1="320" y1="534" x2="1196" y2="534" stroke="#1E293B" opacity=".4"/>
      <text x="326" y="560" fill="#E6EDFF" font-weight="600">Smart gaps</text>
      <g transform="translate(1140 546)"><rect width="44" height="24" rx="12" fill="#3B82F6"/><circle cx="31" cy="12" r="9" fill="#F0F9FF"/></g>
    </g>
  </g>

  <!-- callouts -->
  <g font-size="11">
    <!-- one control -->
    <g transform="translate(700 214)">
      <rect width="356" height="58" rx="10" fill="#070F22" stroke="#22D3EE" opacity=".97"/>
      <text x="14" y="22" font-weight="700" fill="#22D3EE">One scope control for the whole app</text>
      <text x="14" y="40" fill="#94A3B8">Lives in the chrome, never repeated per page.</text>
    </g>
    <!-- marked-only -->
    <line x1="540" y1="300" x2="326" y2="450" stroke="#3B82F6" stroke-dasharray="3 4" opacity=".5"/>
    <g transform="translate(440 282)">
      <rect width="372" height="64" rx="10" fill="#070F22" stroke="#3B82F6" opacity=".97"/>
      <text x="14" y="22" font-weight="700" fill="#3B82F6">◆ marks the only settings that vary</text>
      <text x="14" y="40" fill="#94A3B8">Colors / Decorations / Borders are global — the</text>
      <text x="14" y="55" fill="#94A3B8">band above doesn't touch them. Gaps does.</text>
    </g>
    <!-- tradeoff -->
    <g transform="translate(836 484)">
      <rect width="360" height="80" rx="10" fill="#070F22" stroke="#FBBF24" opacity=".97"/>
      <text x="14" y="22" font-weight="700" fill="#FBBF24">⚠ The trade‑off</text>
      <text x="14" y="40" fill="#94A3B8">The band sits above global cards, so at a glance</text>
      <text x="14" y="55" fill="#94A3B8">it can read as page‑wide. The ◆ markers are</text>
      <text x="14" y="70" fill="#94A3B8">what carry the disambiguation, not position.</text>
    </g>
  </g>

  <text x="640" y="648" text-anchor="middle" fill="#E6EDFF" font-size="14" font-weight="600">
    Option 2 — App‑level scope band · appears once for the whole app
  </text>
  <text x="640" y="668" text-anchor="middle" fill="#94A3B8" font-size="11">
    Scope lives in the chrome; only ◆‑marked cards react. Global cards ignore it. Gaps shows “DP‑2 · overridden” + reset; settings keep their topical homes.
  </text>
  <text x="640" y="686" text-anchor="middle" fill="#94A3B8" font-size="9" opacity=".7">
    Honesty rests on the ◆ marker rather than position · Theme: phosphor‑works.github.io/palette
  </text>
</svg>
