<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, system-ui, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a2e" stroke-width="0.5"/>
    </pattern>
    <pattern id="gridSmall" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#12122a" stroke-width="0.3"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="viewportGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#29b6f6;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#0d0d1a"/>
  <rect width="1200" height="800" fill="url(#gridSmall)"/>
  <rect width="1200" height="800" fill="url(#grid)"/>

  <!-- Title -->
  <text x="600" y="35" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Infinite Canvas — Zoomed-Out Overview</text>
  <text x="600" y="55" text-anchor="middle" fill="#666" font-size="11">Each cluster is a viewport bookmark (replaces virtual desktops)</text>

  <!-- Canvas coordinate labels -->
  <text x="15" y="85" fill="#444" font-size="9">(0,0)</text>
  <text x="1155" y="85" fill="#444" font-size="9">(3,0)</text>
  <text x="15" y="760" fill="#444" font-size="9">(0,2)</text>

  <!-- ═══ VIEWPORT 1: HOME (Primary workspace) ═══ -->
  <g transform="translate(60, 90)">
    <!-- Viewport boundary -->
    <rect x="0" y="0" width="340" height="220" rx="6" fill="url(#viewportGrad)" stroke="#4fc3f7" stroke-width="2" stroke-dasharray="none" filter="url(#glow)"/>
    <text x="170" y="-8" text-anchor="middle" fill="#4fc3f7" font-size="11" font-weight="600">⬡ HOME — Desktop 1 (active viewport)</text>

    <!-- Zone: Main (60%) -->
    <rect x="10" y="10" width="195" height="200" rx="4" fill="#1b2838" stroke="#66bb6a" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="105" y="30" text-anchor="middle" fill="#66bb6a" font-size="9" font-weight="500">Main Zone (60%)</text>
    <!-- Window in main -->
    <rect x="18" y="38" width="180" height="165" rx="3" fill="#1e3a2a" stroke="#388e3c" stroke-width="1"/>
    <rect x="18" y="38" width="180" height="18" rx="3" fill="#2e5a3a"/>
    <text x="28" y="51" fill="#a5d6a7" font-size="8">VS Code — project.cpp</text>
    <rect x="22" y="62" width="100" height="4" rx="1" fill="#2e7d32" opacity="0.5"/>
    <rect x="22" y="70" width="140" height="4" rx="1" fill="#2e7d32" opacity="0.4"/>
    <rect x="22" y="78" width="80" height="4" rx="1" fill="#2e7d32" opacity="0.3"/>

    <!-- Zone: Side (40%) -->
    <rect x="215" y="10" width="115" height="95" rx="4" fill="#1b2838" stroke="#42a5f5" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="272" y="30" text-anchor="middle" fill="#42a5f5" font-size="9" font-weight="500">Terminal</text>
    <!-- Window -->
    <rect x="222" y="38" width="100" height="60" rx="3" fill="#0d1b2a" stroke="#1565c0" stroke-width="1"/>
    <text x="230" y="55" fill="#64b5f6" font-size="7">$ cmake --build</text>
    <text x="230" y="67" fill="#4caf50" font-size="7">[100%] Built</text>

    <!-- Zone: Bottom-right -->
    <rect x="215" y="115" width="115" height="95" rx="4" fill="#1b2838" stroke="#ab47bc" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="272" y="135" text-anchor="middle" fill="#ab47bc" font-size="9" font-weight="500">Chat</text>
    <rect x="222" y="143" width="100" height="60" rx="3" fill="#1a0d2a" stroke="#7b1fa2" stroke-width="1"/>
    <text x="230" y="160" fill="#ce93d8" font-size="7">Claude Code</text>
  </g>

  <!-- ═══ VIEWPORT 2: REFERENCE (one screen right) ═══ -->
  <g transform="translate(440, 90)">
    <rect x="0" y="0" width="340" height="220" rx="6" fill="none" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.6"/>
    <text x="170" y="-8" text-anchor="middle" fill="#ff9800" font-size="11" font-weight="500">REFERENCE — Desktop 2</text>

    <!-- Zone: Docs -->
    <rect x="10" y="10" width="155" height="200" rx="4" fill="#1b2838" stroke="#ffb74d" stroke-width="1" opacity="0.7"/>
    <text x="87" y="30" text-anchor="middle" fill="#ffb74d" font-size="9">Docs Zone</text>
    <rect x="18" y="38" width="140" height="165" rx="3" fill="#2a1f0d" stroke="#e65100" stroke-width="1" opacity="0.7"/>
    <rect x="18" y="38" width="140" height="18" rx="3" fill="#3a2f0d"/>
    <text x="28" y="51" fill="#ffcc80" font-size="8">Qt6 Docs — QObject</text>
    <rect x="22" y="62" width="90" height="4" rx="1" fill="#e65100" opacity="0.3"/>
    <rect x="22" y="70" width="120" height="4" rx="1" fill="#e65100" opacity="0.2"/>

    <!-- Zone: Browser -->
    <rect x="175" y="10" width="155" height="200" rx="4" fill="#1b2838" stroke="#ffb74d" stroke-width="1" opacity="0.7"/>
    <text x="252" y="30" text-anchor="middle" fill="#ffb74d" font-size="9">Browser Zone</text>
    <rect x="183" y="38" width="140" height="165" rx="3" fill="#2a1f0d" stroke="#e65100" stroke-width="1" opacity="0.7"/>
    <rect x="183" y="38" width="140" height="18" rx="3" fill="#3a2f0d"/>
    <text x="193" y="51" fill="#ffcc80" font-size="8">KDE API Reference</text>
  </g>

  <!-- ═══ VIEWPORT 3: MEDIA (two screens right) ═══ -->
  <g transform="translate(820, 90)">
    <rect x="0" y="0" width="340" height="220" rx="6" fill="none" stroke="#78909c" stroke-width="1" stroke-dasharray="8,4" opacity="0.4"/>
    <text x="170" y="-8" text-anchor="middle" fill="#78909c" font-size="11" font-weight="500">MEDIA — Desktop 3</text>

    <!-- Zone: Video -->
    <rect x="10" y="10" width="320" height="130" rx="4" fill="#1b2838" stroke="#546e7a" stroke-width="1" opacity="0.5"/>
    <text x="170" y="30" text-anchor="middle" fill="#78909c" font-size="9">Video Zone</text>
    <rect x="18" y="38" width="304" height="95" rx="3" fill="#0d1520" stroke="#37474f" stroke-width="1" opacity="0.5"/>
    <text x="170" y="85" text-anchor="middle" fill="#546e7a" font-size="10">▶ Conference Call</text>

    <!-- Zone: Notes -->
    <rect x="10" y="150" width="320" height="60" rx="4" fill="#1b2838" stroke="#546e7a" stroke-width="1" opacity="0.5"/>
    <text x="170" y="170" text-anchor="middle" fill="#78909c" font-size="9">Notes Zone</text>
    <rect x="18" y="178" width="304" height="25" rx="3" fill="#0d1520" stroke="#37474f" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- ═══ VIEWPORT 4: TESTING (below home) ═══ -->
  <g transform="translate(60, 370)">
    <rect x="0" y="0" width="340" height="220" rx="6" fill="none" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.6"/>
    <text x="170" y="-8" text-anchor="middle" fill="#ef5350" font-size="11" font-weight="500">TESTING — Desktop 4</text>

    <!-- Zone: Test runner -->
    <rect x="10" y="10" width="320" height="95" rx="4" fill="#1b2838" stroke="#e57373" stroke-width="1" opacity="0.7"/>
    <text x="170" y="30" text-anchor="middle" fill="#e57373" font-size="9">Test Runner Zone</text>
    <rect x="18" y="38" width="304" height="60" rx="3" fill="#1a0d0d" stroke="#c62828" stroke-width="1" opacity="0.7"/>
    <text x="28" y="55" fill="#ef9a9a" font-size="8">$ ctest --output-on-failure</text>
    <text x="28" y="68" fill="#4caf50" font-size="7">✓ 42/42 tests passed</text>
    <text x="28" y="80" fill="#4caf50" font-size="7">✓ All zone geometry tests OK</text>

    <!-- Zone: Coverage -->
    <rect x="10" y="115" width="155" height="95" rx="4" fill="#1b2838" stroke="#e57373" stroke-width="1" opacity="0.7"/>
    <text x="87" y="135" text-anchor="middle" fill="#e57373" font-size="9">Coverage</text>

    <!-- Zone: Debug -->
    <rect x="175" y="115" width="155" height="95" rx="4" fill="#1b2838" stroke="#e57373" stroke-width="1" opacity="0.7"/>
    <text x="252" y="135" text-anchor="middle" fill="#e57373" font-size="9">Debugger</text>
  </g>

  <!-- ═══ VIEWPORT 5: DESIGN (below reference) ═══ -->
  <g transform="translate(440, 370)">
    <rect x="0" y="0" width="340" height="220" rx="6" fill="none" stroke="#26c6da" stroke-width="1" stroke-dasharray="8,4" opacity="0.5"/>
    <text x="170" y="-8" text-anchor="middle" fill="#26c6da" font-size="11" font-weight="500">DESIGN — Desktop 5</text>

    <!-- Zone: Editor -->
    <rect x="10" y="10" width="320" height="200" rx="4" fill="#1b2838" stroke="#00acc1" stroke-width="1" opacity="0.5"/>
    <text x="170" y="30" text-anchor="middle" fill="#26c6da" font-size="9">Layout Editor Zone</text>
    <rect x="18" y="38" width="304" height="165" rx="3" fill="#0d1a20" stroke="#006064" stroke-width="1" opacity="0.5"/>
    <text x="170" y="120" text-anchor="middle" fill="#4dd0e1" font-size="10">PlasmaZones Editor</text>
  </g>

  <!-- ═══ EMPTY CANVAS SPACE (bottom-right) ═══ -->
  <g transform="translate(820, 370)">
    <rect x="0" y="0" width="340" height="220" rx="6" fill="none" stroke="#333" stroke-width="1" stroke-dasharray="4,8" opacity="0.3"/>
    <text x="170" y="110" text-anchor="middle" fill="#333" font-size="11">+ Add workspace</text>
    <text x="170" y="130" text-anchor="middle" fill="#2a2a2a" font-size="9">(drag zones here to create)</text>
  </g>

  <!-- ═══ NAVIGATION INDICATORS ═══ -->
  <!-- Pan arrows between viewports -->
  <g opacity="0.5">
    <!-- Home → Reference -->
    <line x1="405" y1="200" x2="435" y2="200" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <!-- Home → Testing -->
    <line x1="230" y1="315" x2="230" y2="365" stroke="#666" stroke-width="1.5"/>
    <!-- Reference → Media -->
    <line x1="785" y1="200" x2="815" y2="200" stroke="#666" stroke-width="1.5"/>
    <!-- Reference → Design -->
    <line x1="610" y1="315" x2="610" y2="365" stroke="#666" stroke-width="1.5"/>
  </g>

  <!-- ═══ LEGEND ═══ -->
  <g transform="translate(60, 640)">
    <text x="0" y="0" fill="#888" font-size="12" font-weight="600">Navigation</text>

    <rect x="0" y="15" width="20" height="12" rx="2" fill="url(#viewportGrad)" stroke="#4fc3f7" stroke-width="1.5"/>
    <text x="28" y="25" fill="#aaa" font-size="9">Active viewport (visible on screen)</text>

    <rect x="0" y="35" width="20" height="12" rx="2" fill="none" stroke="#ff9800" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="28" y="45" fill="#aaa" font-size="9">Inactive viewport (pan/hotkey to reach)</text>

    <rect x="0" y="55" width="20" height="12" rx="2" fill="#1b2838" stroke="#66bb6a" stroke-width="1"/>
    <text x="28" y="65" fill="#aaa" font-size="9">Zone with snapped window</text>

    <text x="300" y="0" fill="#888" font-size="12" font-weight="600">Interactions</text>
    <text x="300" y="20" fill="#aaa" font-size="9">Meta+Scroll — Pan viewport horizontally</text>
    <text x="300" y="36" fill="#aaa" font-size="9">Meta+Ctrl+[1-9] — Jump to bookmarked viewport</text>
    <text x="300" y="52" fill="#aaa" font-size="9">Meta+Pinch — Zoom out to this overview</text>
    <text x="300" y="68" fill="#aaa" font-size="9">Drag window to canvas edge — Auto-pan</text>

    <text x="650" y="0" fill="#888" font-size="12" font-weight="600">Coordinates</text>
    <text x="650" y="20" fill="#aaa" font-size="9">Each viewport = 1.0 × 1.0 canvas unit</text>
    <text x="650" y="36" fill="#aaa" font-size="9">Zones use canvas-relative coords (e.g. 1.3, 0.2)</text>
    <text x="650" y="52" fill="#aaa" font-size="9">Zones off-viewport are culled (no CPU cost)</text>
    <text x="650" y="68" fill="#aaa" font-size="9">Smooth 300ms ease between viewports</text>
  </g>

  <!-- ═══ MINIMAP (bottom-right corner) ═══ -->
  <g transform="translate(960, 640)">
    <rect x="0" y="0" width="200" height="100" rx="4" fill="#0a0a15" stroke="#333" stroke-width="1"/>
    <text x="100" y="-6" text-anchor="middle" fill="#555" font-size="9">Minimap (always visible)</text>

    <!-- Mini viewport blocks -->
    <rect x="10" y="10" width="55" height="35" rx="2" fill="#4fc3f7" opacity="0.4" stroke="#4fc3f7" stroke-width="1"/>
    <rect x="70" y="10" width="55" height="35" rx="2" fill="#ff9800" opacity="0.2" stroke="#ff9800" stroke-width="0.5"/>
    <rect x="130" y="10" width="55" height="35" rx="2" fill="#78909c" opacity="0.15" stroke="#78909c" stroke-width="0.5"/>
    <rect x="10" y="50" width="55" height="35" rx="2" fill="#ef5350" opacity="0.2" stroke="#ef5350" stroke-width="0.5"/>
    <rect x="70" y="50" width="55" height="35" rx="2" fill="#26c6da" opacity="0.15" stroke="#26c6da" stroke-width="0.5"/>
    <rect x="130" y="50" width="55" height="35" rx="2" fill="#333" opacity="0.1" stroke="#333" stroke-width="0.5" stroke-dasharray="2,2"/>

    <!-- Active indicator -->
    <text x="37" y="31" text-anchor="middle" fill="#fff" font-size="7" font-weight="bold">●</text>
  </g>

  <!-- Screen boundary indicator -->
  <rect x="55" y="85" width="350" height="230" rx="8" fill="none" stroke="#4fc3f7" stroke-width="0.5" opacity="0.3"/>
  <text x="58" y="780" fill="#333" font-size="9">Canvas extends infinitely — add viewports in any direction</text>
</svg>