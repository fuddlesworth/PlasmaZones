<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="wp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1730"/>
      <stop offset=".55" stop-color="#070F22"/>
      <stop offset="1" stop-color="#050916"/>
    </linearGradient>
    <filter id="blurStrong" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="80"/>
    </filter>
    <symbol id="i-lock" viewBox="0 0 18 18">
      <rect x="3" y="8" width="12" height="8" rx="2" fill="currentColor"/>
      <path d="M 5.5 8 V 5.5 A 3.5 3.5 0 0 1 12.5 5.5 V 8" fill="none" stroke="currentColor" stroke-width="1.6"/>
    </symbol>
  </defs>

  <rect width="1280" height="720" fill="url(#wp)"/>
  <!-- Wallpaper blur circles drift subtly -->
  <g opacity=".5" filter="url(#blurStrong)">
    <circle cx="900" cy="220" r="280" fill="#A855F7">
      <animate attributeName="cx" values="900;920;900" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="220;210;220" dur="14s" repeatCount="indefinite"/>
    </circle>
    <circle cx="280" cy="500" r="240" fill="#22D3EE">
      <animate attributeName="cx" values="280;264;280" dur="16s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="500;512;500" dur="16s" repeatCount="indefinite"/>
    </circle>
  </g>
  <rect width="1280" height="720" fill="#050916" opacity=".2"/>

  <!-- Big clock -->
  <g transform="translate(640 160)" text-anchor="middle">
    <text fill="#E6EDFF" font-size="120" font-weight="200" font-variant-numeric="tabular-nums">14:32</text>
    <text fill="#E6EDFF" font-size="18" y="40" opacity=".8">Sunday, May 24</text>
  </g>

  <!-- Lock badge with pulse -->
  <g transform="translate(640 320)" color="#3B82F6">
    <circle r="22" fill="#0B1730" opacity=".7" stroke="#3B82F6" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="r" values="22;25;22" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <use href="#i-lock" x="-9" y="-9" width="18" height="18"/>
  </g>

  <!-- Media card -->
  <g transform="translate(440 360)">
    <rect width="400" height="92" rx="20" fill="#0B1730" opacity=".88" stroke="#1E293B"/>
    <rect x="14" y="14" width="64" height="64" rx="14" fill="#A855F7"/>
    <text x="46" y="50" text-anchor="middle" fill="#0B1730" font-size="9" opacity=".5">album</text>
    <text x="94" y="34" fill="#E6EDFF" font-size="14" font-weight="600">Massage Situation</text>
    <text x="94" y="52" fill="#94A3B8" font-size="11">Flying Lotus · Cosmogramma</text>
    <g transform="translate(94 64)">
      <rect width="160" height="4" rx="2" fill="#1E293B"/>
      <rect width="80" height="4" rx="2" fill="#3B82F6">
        <animate attributeName="width" values="80;90;80" dur="10s" repeatCount="indefinite"/>
      </rect>
    </g>
    <g transform="translate(316 48)" fill="#E6EDFF">
      <path d="M -28 -6 L -38 0 L -28 6 Z"/>
      <circle r="14" fill="#3B82F6"/>
      <rect x="-5" y="-7" width="3" height="14" fill="#0B1730"/>
      <rect x="2" y="-7" width="3" height="14" fill="#0B1730"/>
      <path d="M 28 -6 L 38 0 L 28 6 Z"/>
    </g>
  </g>

  <!-- PAM input -->
  <g transform="translate(440 478)">
    <rect width="400" height="100" rx="20" fill="#0B1730" opacity=".92" stroke="#1E293B"/>
    <circle cx="56" cy="50" r="30" fill="#101A36" stroke="#3B82F6" stroke-width="2"/>
    <text x="56" y="58" text-anchor="middle" fill="#E6EDFF" font-size="24" font-weight="600">n</text>
    <text x="104" y="42" fill="#E6EDFF" font-size="14" font-weight="600">Nathan</text>
    <text x="104" y="58" fill="#94A3B8" font-size="11">phosphor‑desktop</text>
    <g transform="translate(104 70)">
      <rect width="276" height="22" rx="11" fill="#070F22" stroke="#1E293B"/>
      <!-- Dots appearing one at a time (typing animation) -->
      <g transform="translate(14 11)" fill="#E6EDFF">
        <circle r="3">
          <animate attributeName="opacity" values="0;1;1;1;1;1;1;0" keyTimes="0;0.08;0.2;0.34;0.5;0.68;0.95;1" dur="5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="12" r="3">
          <animate attributeName="opacity" values="0;0;1;1;1;1;1;0" keyTimes="0;0.16;0.22;0.34;0.5;0.68;0.95;1" dur="5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="24" r="3">
          <animate attributeName="opacity" values="0;0;0;1;1;1;1;0" keyTimes="0;0.16;0.26;0.36;0.5;0.68;0.95;1" dur="5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="36" r="3">
          <animate attributeName="opacity" values="0;0;0;0;1;1;1;0" keyTimes="0;0.16;0.26;0.38;0.5;0.68;0.95;1" dur="5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="48" r="3">
          <animate attributeName="opacity" values="0;0;0;0;0;1;1;0" keyTimes="0;0.16;0.26;0.38;0.52;0.6;0.95;1" dur="5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="60" r="3">
          <animate attributeName="opacity" values="0;0;0;0;0;0;1;0" keyTimes="0;0.16;0.26;0.38;0.52;0.68;0.78;1" dur="5s" repeatCount="indefinite"/>
        </circle>
      </g>
      <line x1="78" y1="5" x2="78" y2="17" stroke="#3B82F6" stroke-width="2">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
      </line>
      <text x="266" y="15" text-anchor="end" fill="#94A3B8" font-size="10">↵</text>
    </g>
  </g>

  <!-- Bottom chips -->
  <g transform="translate(640 632)" text-anchor="middle" font-size="11">
    <g transform="translate(-130 0)">
      <rect x="-32" y="-14" width="64" height="26" rx="13" fill="#0B1730" opacity=".7" stroke="#1E293B"/>
      <text fill="#E6EDFF" y="4">EN · US</text>
    </g>
    <g>
      <rect x="-44" y="-14" width="88" height="26" rx="13" fill="#0B1730" opacity=".7" stroke="#1E293B"/>
      <rect x="-32" y="-6" width="20" height="12" rx="2" fill="#10B981"/>
      <text fill="#E6EDFF" x="10" y="4">82%</text>
    </g>
    <g transform="translate(130 0)">
      <rect x="-52" y="-14" width="104" height="26" rx="13" fill="#0B1730" opacity=".7" stroke="#1E293B"/>
      <text fill="#E6EDFF" y="4">Accessibility</text>
    </g>
  </g>

  <g font-size="11">
    <g transform="translate(40 80)">
      <rect width="260" height="76" rx="8" fill="#070F22" stroke="#3B82F6" opacity=".94"/>
      <text x="14" y="22" font-weight="600" fill="#3B82F6">ext‑session‑lock‑v1</text>
      <text x="14" y="38" fill="#94A3B8">One LockSurface per screen. The</text>
      <text x="14" y="52" fill="#94A3B8">Phosphor compositor implements</text>
      <text x="14" y="66" fill="#94A3B8">the protocol; PAM in‑process.</text>
    </g>
    <g transform="translate(40 180)">
      <rect width="260" height="76" rx="8" fill="#070F22" stroke="#A855F7" opacity=".94"/>
      <text x="14" y="22" font-weight="600" fill="#A855F7">Same theme tokens</text>
      <text x="14" y="38" fill="#94A3B8">Lock surface binds Theme singleton;</text>
      <text x="14" y="52" fill="#94A3B8">if wallpaper retinted the desktop,</text>
      <text x="14" y="66" fill="#94A3B8">it retinted the lockscreen.</text>
    </g>
    <g transform="translate(40 280)">
      <rect width="260" height="76" rx="8" fill="#070F22" stroke="#22D3EE" opacity=".94"/>
      <text x="14" y="22" font-weight="600" fill="#22D3EE">Media card stays alive</text>
      <text x="14" y="38" fill="#94A3B8">MPRIS service runs in shell process;</text>
      <text x="14" y="52" fill="#94A3B8">card is a re‑use of MediaCard.qml</text>
      <text x="14" y="66" fill="#94A3B8">that lives in the dashboard too.</text>
    </g>

    <g transform="translate(980 80)">
      <rect width="260" height="76" rx="8" fill="#070F22" stroke="#3B82F6" opacity=".94"/>
      <text x="14" y="22" font-weight="600" fill="#3B82F6">PAM auth</text>
      <text x="14" y="38" fill="#94A3B8">phosphor‑lock owns the</text>
      <text x="14" y="52" fill="#94A3B8">PAM context; LockAuthField is a</text>
      <text x="14" y="66" fill="#94A3B8">pure view binding to it.</text>
    </g>
    <g transform="translate(980 180)">
      <rect width="260" height="76" rx="8" fill="#070F22" stroke="#A855F7" opacity=".94"/>
      <text x="14" y="22" font-weight="600" fill="#A855F7">Modal popout</text>
      <text x="14" y="38" fill="#94A3B8">PopoutService Modal mode suppresses</text>
      <text x="14" y="52" fill="#94A3B8">all Cooperative popouts across</text>
      <text x="14" y="66" fill="#94A3B8">every screen.</text>
    </g>
    <g transform="translate(980 280)">
      <rect width="260" height="60" rx="8" fill="#070F22" stroke="#22D3EE" opacity=".94"/>
      <text x="14" y="22" font-weight="600" fill="#22D3EE">DPMS fadeout</text>
      <text x="14" y="38" fill="#94A3B8">FadeToDpmsWindow plays before</text>
      <text x="14" y="52" fill="#94A3B8">monitor sleep (DMS pattern).</text>
    </g>
  </g>
</svg>
