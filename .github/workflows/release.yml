# PlasmaZones Release Pipeline
# Builds distribution packages when a version tag is pushed
# SPDX-FileCopyrightText: 2026 fuddlesworth
# SPDX-License-Identifier: GPL-3.0-or-later

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v3.0.0). Must already exist.'
        required: true

# Default scope is read-only. Only the `release` job and the AUR publish
# need writes — they opt in via per-job permissions blocks.
permissions:
  contents: read

# Two tag pushes (or a re-run of the same tag dispatch) must not race
# the delete-and-recreate dance in the `release` job. Serialising per
# ref keeps multiple in-flight releases out of each other's way.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Extract version from tag
  # ═══════════════════════════════════════════════════════════════════════════
  version:
    name: Extract Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - name: Extract version from tag
        id: version
        # Pass the user-supplied dispatch input through env (not via ${{ … }}
        # interpolation into the script body) so a malicious tag value can't
        # break out of the string and run arbitrary shell — the standard
        # GitHub Actions script-injection hardening pattern.
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          # On push the ref is refs/tags/v<x>; on manual dispatch we
          # accept an explicit tag input. Fail loudly if neither yields
          # a tag-shaped value so downstream packaging steps don't see
          # `heads/v3` or empty.
          if [[ -n "${INPUT_TAG:-}" ]]; then
              REF="refs/tags/${INPUT_TAG#refs/tags/}"
          else
              REF="$GITHUB_REF"
          fi
          if [[ "$REF" != refs/tags/v* ]]; then
              echo "Error: refusing to release from non-tag ref: $REF" >&2
              exit 1
          fi
          VERSION="${REF#refs/tags/v}"
          # Strict format gate: anything that interpolates this into a
          # `run:` body downstream (PKGBUILD heredoc, sed `s/^Version:/`,
          # tarball filenames) must not allow shell metacharacters. Tags
          # outside this shape are refused before they propagate. The
          # pre-release suffix requires either no digits (`-rc`) or at
          # least one digit (`-rc1` / `-rc.1`) — a trailing dot like
          # `v3.0.0-rc.` is rejected as malformed.
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta|rc)(\.?[0-9]+)?)?$ ]]; then
              echo "Error: VERSION '$VERSION' is not in <major>.<minor>.<patch>[-alpha|beta|rc[.N|N]] form" >&2
              exit 1
          fi
          # Pre-release detection: canonical semver-ish suffixes (-alpha
          # / -alpha1 / -beta.3 / -rc / -rc1 / -rc.1). A tag like
          # v3.0.0-arch1 is rejected by the gate above as non-semver.
          IS_PRE=false
          if [[ "$VERSION" =~ -(alpha|beta|rc)(\.?[0-9]+)?$ ]]; then
              IS_PRE=true
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRE" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION (prerelease=$IS_PRE)"

  # ═══════════════════════════════════════════════════════════════════════════
  # Build Debian Package (KDE Neon - ships Plasma/KF6 6.7+)
  # ═══════════════════════════════════════════════════════════════════════════
  build-deb:
    name: Build .deb (KDE Neon)
    needs: version
    runs-on: ubuntu-latest
    container:
      image: invent-registry.kde.org/neon/docker-images/plasma:user
      options: --user root

    steps:
      - name: Install prerequisites
        run: |
          apt-get update
          apt-get install -y --no-install-recommends git ca-certificates

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          apt-get install -y --no-install-recommends \
            cmake ninja-build extra-cmake-modules g++ pkg-config \
            build-essential pkg-kde-tools \
            devscripts debhelper fakeroot dpkg-dev \
            qt6-base-dev qt6-base-private-dev qt6-declarative-dev qt6-tools-dev qt6-shadertools-dev qt6-svg-dev \
            kwin-dev libwayland-dev libvulkan-dev libepoxy-dev libdrm-dev libxkbcommon-dev \
            libkf6config-dev libkf6configwidgets-dev \
            qt6-wayland-private-dev \
            libkf6kcmutils-dev \
            libkf6windowsystem-dev libkf6globalaccel-dev \
            libkf6notifications-dev \
            qt6-wayland-dev plasma-activities-dev
          # Kirigami dev package name varies across distros
          apt-get install -y --no-install-recommends libkf6kirigami-dev 2>/dev/null \
            || apt-get install -y --no-install-recommends kf6-kirigami-dev

      - name: Generate Debian changelog from CHANGELOG.md
        run: bash packaging/generate-changelog.sh debian

      - name: Build Debian package
        # Force bash: this step uses `set -o pipefail` and `compgen`, both
        # bash builtins. The KDE Neon container's /bin/sh is dash, and
        # GitHub's container default shell resolved to sh here, so the
        # step aborted on 'Illegal option -o pipefail'.
        shell: bash
        run: |
          set -euo pipefail
          # dpkg-buildpackage expects debian/ at project root. Remove any
          # pre-existing entry first — `ln -sfn` only replaces symlinks,
          # not a real directory left behind by an earlier step or rerun.
          rm -rf debian
          ln -sfn packaging/debian debian
          dpkg-buildpackage -us -uc -b
          mkdir -p dist
          mv ../*.deb dist/
          # Move debug symbol packages explicitly via find so a missing
          # .ddeb file fails loudly instead of being swallowed by glob.
          if compgen -G "../*.ddeb" >/dev/null; then
              mv ../*.ddeb dist/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: deb-kde-neon
          path: dist/*.*deb
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # Build RPM Package
  # ═══════════════════════════════════════════════════════════════════════════
  build-rpm:
    name: Build .rpm (Fedora ${{ matrix.fedora }})
    needs: version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Fedora 44 is the earliest release whose repos carry Plasma 6.7
        # (KF 6.26 / Qt 6.10 / KWin 6.7), the PlasmaZones build baseline.
        fedora: [44]
    container:
      image: fedora:${{ matrix.fedora }}

    steps:
      - name: Install prerequisites
        run: dnf install -y git rpm-build rpmdevtools

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          dnf install -y \
            cmake ninja-build extra-cmake-modules gcc-c++ \
            qt6-qtbase-devel qt6-qtbase-private-devel \
            qt6-qtdeclarative-devel qt6-qttools-devel qt6-qtshadertools-devel qt6-qtsvg-devel \
            kwin-devel wayland-devel vulkan-loader-devel vulkan-headers libepoxy-devel libdrm-devel \
            kf6-kconfig-devel kf6-kconfigwidgets-devel \
            kf6-kirigami-devel \
            kf6-kcmutils-devel \
            kf6-kglobalaccel-devel \
            qt6-qtwayland-devel \
            plasma-activities-devel

      - name: Setup rpmbuild
        run: rpmdev-setuptree

      # Template the version FIRST so the source tarball baked into the
      # SRPM carries the matching spec rather than the 0.0.0 placeholder.
      - name: Generate RPM changelog and set version from CHANGELOG.md
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          sed -i "s/^Version:.*/Version:        $VERSION/" packaging/rpm/plasmazones.spec
          bash packaging/generate-changelog.sh rpm

      - name: Create source tarball
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          mkdir -p PlasmaZones-${VERSION}
          # Copy source files. Exclude anything produced by prior steps
          # in this workflow so re-runs in the same workspace don't pull
          # build artifacts into the SRPM tarball, and exclude the
          # tarball-staging directory itself so tar doesn't recurse into
          # the in-progress copy.
          tar \
              --exclude='./.git' \
              --exclude='./build' \
              --exclude='./dist' \
              --exclude='./install' \
              --exclude='./AppDir' \
              --exclude='./result' \
              --exclude='./artifacts' \
              --exclude="./PlasmaZones-${VERSION}" \
              -cf - . | tar -xf - -C "PlasmaZones-${VERSION}/"
          tar czf ~/rpmbuild/SOURCES/plasmazones-${VERSION}.tar.gz PlasmaZones-${VERSION}

      - name: Build RPM
        run: |
          cp packaging/rpm/plasmazones.spec ~/rpmbuild/SPECS/
          rpmbuild -bb ~/rpmbuild/SPECS/plasmazones.spec
          mkdir -p dist
          cp ~/rpmbuild/RPMS/*/*.rpm dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: rpm-fedora-${{ matrix.fedora }}
          path: dist/*.rpm
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # Build RPM Package (openSUSE Tumbleweed)
  # ═══════════════════════════════════════════════════════════════════════════
  build-rpm-opensuse:
    name: Build .rpm (openSUSE Tumbleweed)
    needs: version
    runs-on: ubuntu-latest
    container:
      image: opensuse/tumbleweed:latest

    steps:
      - name: Install prerequisites
        # Tumbleweed mirrors occasionally lag one snapshot behind the
        # container's baked-in package index — metadata advertises a new
        # version of a transitive dep (e.g. file-magic in v3.0.15) but
        # the matching .rpm is not yet on any mirror, every mirror
        # returns 404, zypper exits 4 and the whole release blocks.
        # Two changes vs the pre-3.0.15 form:
        #
        #   1. Drop `zypper dist-upgrade`. That was an Arch-style
        #      "full system upgrade to prevent partial-upgrade state"
        #      reflex, but on a one-shot CI builder it instead pulls
        #      every transitive dep of every installed package to its
        #      newest snapshot version — which is what exposed us to
        #      the file-magic 404. The base image is already recent
        #      enough to build rpm-build + git + rpmdevtools without
        #      upgrades.
        #
        #   2. Wrap the install in a refresh-and-retry. If the first
        #      attempt fails to a missing .rpm, sleep 60s, re-pull
        #      metadata (mirrors typically catch up within minutes),
        #      and try once more. Single retry is enough — if the
        #      second pass still fails, the failure is real and we
        #      want the release to block rather than loop forever.
        run: |
          set -euo pipefail
          install_with_retry() {
              zypper -n --gpg-auto-import-keys refresh --force
              if ! zypper -n install "$@"; then
                  echo "::warning::zypper install failed; sleeping 60s and retrying after metadata refresh"
                  sleep 60
                  zypper -n --gpg-auto-import-keys refresh --force
                  zypper -n install "$@"
              fi
          }
          install_with_retry git rpm-build rpmdevtools

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build dependencies
        # Reuse the install-with-retry shape from the prerequisites step.
        # Inlined because each step gets its own shell — no sourcing
        # across steps. The build-dep list is larger so it's also more
        # exposed to transient mirror flakes; the retry is load-bearing.
        run: |
          set -euo pipefail
          install_with_retry() {
              zypper -n --gpg-auto-import-keys refresh --force
              if ! zypper -n install "$@"; then
                  echo "::warning::zypper install failed; sleeping 60s and retrying after metadata refresh"
                  sleep 60
                  zypper -n --gpg-auto-import-keys refresh --force
                  zypper -n install "$@"
              fi
          }
          install_with_retry \
            cmake ninja extra-cmake-modules gcc-c++ \
            qt6-core-private-devel qt6-gui-private-devel qt6-quick-private-devel \
            'cmake(Qt6Core)' 'cmake(Qt6DBus)' 'cmake(Qt6Gui)' \
            'cmake(Qt6Qml)' 'cmake(Qt6Quick)' 'cmake(Qt6QuickControls2)' \
            'cmake(Qt6Widgets)' 'cmake(Qt6Concurrent)' \
            'cmake(Qt6ShaderTools)' 'cmake(Qt6ShaderToolsPrivate)' 'cmake(Qt6Svg)' 'cmake(Qt6LinguistTools)' \
            'cmake(KF6Config)' 'cmake(KF6ConfigWidgets)' \
            'cmake(KF6Kirigami)' \
            'cmake(KF6KCMUtils)' \
            'cmake(KF6GlobalAccel)' \
            'cmake(KF6WindowSystem)' \
            kwin6-devel wayland-devel vulkan-devel 'cmake(Qt6WaylandClient)' 'cmake(Qt6WaylandClientPrivate)' 'cmake(PlasmaActivities)' \
            'pkgconfig(systemd)'

      - name: Setup rpmbuild
        run: rpmdev-setuptree

      - name: Generate RPM changelog and set version from CHANGELOG.md
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          sed -i "s/^Version:.*/Version:        $VERSION/" packaging/rpm/plasmazones.spec
          bash packaging/generate-changelog.sh rpm

      - name: Create source tarball
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          mkdir -p PlasmaZones-${VERSION}
          # Same exclude list as build-rpm above — keep them in sync.
          tar \
              --exclude='./.git' \
              --exclude='./build' \
              --exclude='./dist' \
              --exclude='./install' \
              --exclude='./AppDir' \
              --exclude='./result' \
              --exclude='./artifacts' \
              --exclude="./PlasmaZones-${VERSION}" \
              -cf - . | tar -xf - -C "PlasmaZones-${VERSION}/"
          tar czf ~/rpmbuild/SOURCES/plasmazones-${VERSION}.tar.gz PlasmaZones-${VERSION}

      - name: Build RPM
        run: |
          cp packaging/rpm/plasmazones.spec ~/rpmbuild/SPECS/
          rpmbuild -bb ~/rpmbuild/SPECS/plasmazones.spec
          mkdir -p dist
          cp ~/rpmbuild/RPMS/*/*.rpm dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: rpm-opensuse-tumbleweed
          path: dist/*.rpm
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # Build Generic Linux Tarball (Portable)
  # ═══════════════════════════════════════════════════════════════════════════
  build-generic:
    name: Build Tarball (Linux x86_64)
    needs: version
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    outputs:
      kwin-version: ${{ steps.kwin-version.outputs.version }}

    steps:
      - name: Install prerequisites
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm git tar

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          pacman -S --noconfirm --needed \
            cmake ninja extra-cmake-modules base-devel \
            qt6-base qt6-declarative qt6-tools qt6-shadertools qt6-svg \
            kwin wayland vulkan-headers vulkan-icd-loader libepoxy libdrm \
            kconfig kconfigwidgets \
            kcmutils kglobalaccel \
            qt6-wayland plasma-activities

      - name: Capture build-time KWin version
        id: kwin-version
        # The kwin-effect plugin's IID embeds KWin's exact upstream version.
        # We record the version we built against so the binary AUR PKGBUILD
        # can pin to it (KWin refuses to load effects with mismatched IIDs).
        run: |
          KWIN_VER=$(pacman -Q kwin | awk '{print $2}' | cut -d- -f1)
          echo "version=$KWIN_VER" >> "$GITHUB_OUTPUT"
          echo "Built against KWin $KWIN_VER"

      - name: Configure
        run: |
          # Install to /usr inside the AppDir
          # The installer script will copy this structure to ~/.local
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DCMAKE_INSTALL_LIBDIR=lib \
            -DBUILD_TESTING=OFF

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Install to AppDir
        run: |
          mkdir -p AppDir
          DESTDIR="${PWD}/AppDir" cmake --install build

      - name: Prepare tarball
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          DIRNAME="plasmazones-linux-x86_64"

          mkdir -p "$DIRNAME"
          mv AppDir/usr "$DIRNAME/"

          # License files at the tarball root. A binary distribution must
          # carry its own licenses, and the AUR plasmazones-bin package —
          # which only ever has this tarball — installs them from here.
          cp LICENSE COPYING.LESSER "$DIRNAME/"

          # Copy installer and uninstaller scripts to root of tarball
          cp packaging/local-install/install.sh "$DIRNAME/"
          cp packaging/local-install/uninstall.sh "$DIRNAME/"
          chmod +x "$DIRNAME/install.sh"
          chmod +x "$DIRNAME/uninstall.sh"

          # Create VERSION file for version detection
          echo "$VERSION" > "$DIRNAME/VERSION"

          # Copy uninstall.sh to the installed location so it's available after install
          mkdir -p "$DIRNAME/usr/share/plasmazones"
          cp packaging/local-install/uninstall.sh "$DIRNAME/usr/share/plasmazones/"
          chmod +x "$DIRNAME/usr/share/plasmazones/uninstall.sh"

          # Create tarball
          tar czf plasmazones-${VERSION}-linux-x86_64.tar.gz "$DIRNAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: generic-linux-tarball
          path: plasmazones-*-linux-x86_64.tar.gz
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # Build Arch Package
  # ═══════════════════════════════════════════════════════════════════════════
  build-arch:
    name: Build .pkg.tar.zst (Arch)
    needs: version
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Setup build environment
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git sudo namcap

          # Create non-root user (makepkg refuses to run as root)
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          pacman -S --noconfirm --needed \
            cmake ninja extra-cmake-modules \
            qt6-base qt6-declarative qt6-tools qt6-shadertools qt6-svg \
            kwin \
            kconfig kconfigwidgets \
            kcmutils kglobalaccel \
            qt6-wayland plasma-activities \
            vulkan-headers vulkan-icd-loader

      - name: Prepare PKGBUILD
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          cd packaging/arch

          # Update version in PKGBUILD
          sed -i "s/^pkgver=.*/pkgver=$VERSION/" PKGBUILD

          # For CI, build from local source instead of downloading tarball
          # Create a modified PKGBUILD that uses local source
          cat > PKGBUILD.ci << 'PKGBUILD_EOF'
          # CI Build - uses local source
          pkgname=plasmazones
          pkgver=${{ needs.version.outputs.version }}
          pkgrel=1
          pkgdesc="Window tiling and autotiling for KDE Plasma"
          arch=('x86_64')
          url="https://github.com/fuddlesworth/PlasmaZones"
          license=('GPL-3.0-or-later' 'LGPL-2.1-or-later')
          # Exact KWin upstream pin — mirrors packaging/arch/PKGBUILD. kwin is
          # installed in the CI build env, so this resolves at parse time.
          _kwin_ver=$(pacman -Q kwin 2>/dev/null | awk '{print $2}' | cut -d- -f1)
          depends=(
              'qt6-base' 'qt6-declarative' 'qt6-shadertools' 'qt6-svg'
              'kconfig' 'kconfigwidgets' 'kirigami'
              'kcmutils' 'kglobalaccel' 'qt6-wayland'
              "kwin${_kwin_ver:+=}${_kwin_ver}"
          )
          makedepends=('cmake' 'extra-cmake-modules' 'qt6-tools' 'ninja')
          optdepends=('plasma-activities: activity-based layouts')
          source=()
          sha256sums=()
          install=plasmazones.install

          build() {
              cd "$startdir/../.."
              cmake -B build -G Ninja \
                  -DCMAKE_BUILD_TYPE=Release \
                  -DCMAKE_INSTALL_PREFIX=/usr \
                  -DCMAKE_INSTALL_LIBDIR=lib \
                  -DBUILD_TESTING=OFF \
                  -Wno-dev
              cmake --build build --parallel
          }

          package() {
              cd "$startdir/../.."
              DESTDIR="$pkgdir" cmake --install build

              # Install pacman hooks
              install -Dm644 packaging/arch/kbuildsycoca.hook \
                  "$pkgdir/usr/share/libalpm/hooks/plasmazones-kbuildsycoca.hook"
              install -Dm755 packaging/arch/plasmazones-refresh-sycoca \
                  "$pkgdir/usr/share/libalpm/scripts/plasmazones-refresh-sycoca"
          }
          PKGBUILD_EOF

      - name: Build package
        run: |
          chown -R builder:builder .
          cd packaging/arch
          su builder -c "makepkg -p PKGBUILD.ci -sf --noconfirm"

      - name: Validate package
        run: |
          cd packaging/arch
          namcap *.pkg.tar.zst || true

      - name: Move artifacts
        run: |
          mkdir -p dist
          mv packaging/arch/*.pkg.tar.zst dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: arch-package
          path: dist/*.pkg.tar.zst
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # Verify Nix Build
  # ═══════════════════════════════════════════════════════════════════════════
  build-nix:
    name: Verify Nix Build
    needs: version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        # SHA-pinned to match ci.yml; bump together when verifying a new release.
        uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build via flake
        run: nix build -L .#default

      - name: Verify package version
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          echo "Expected version: $VERSION"
          ./result/bin/plasmazonesd --version || true

      - name: Generate release package.nix
        run: |
          # Delegate to the versioned script — keeps the awk pattern in
          # one place and adds a `nix-instantiate --parse` smoke check.
          bash packaging/nix/generate-release-nix.sh "${{ needs.version.outputs.version }}"
          echo "=== Generated plasmazones.nix ==="
          cat plasmazones.nix

      - name: Upload Nix package artifact
        uses: actions/upload-artifact@v7
        with:
          name: nix-package
          path: plasmazones.nix
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # Create GitHub Release
  # ═══════════════════════════════════════════════════════════════════════════
  release:
    name: Create GitHub Release
    needs: [version, build-deb, build-rpm, build-rpm-opensuse, build-arch, build-generic, build-nix]
    runs-on: ubuntu-latest
    # No `if:` — the implicit success() gate is intentional. If any
    # package build fails, the release is NOT cut: we don't ship a
    # partial release. Fix the failing distro and re-run the tag.
    # Only this job writes release assets back to the repo.
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Generate release notes from CHANGELOG.md
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          {
            echo "## PlasmaZones v${VERSION}"
            echo ""
            bash packaging/generate-changelog.sh notes "$VERSION"
            echo ""
            echo "### Installation"
            echo ""
            echo "**Arch Linux (AUR):**"
            echo '```bash'
            echo "yay -S plasmazones  # or plasmazones-bin"
            echo '```'
            echo ""
            echo "**Arch Linux (manual):**"
            echo '```bash'
            echo "sudo pacman -U plasmazones-${VERSION}-*-x86_64.pkg.tar.zst"
            echo '```'
            echo ""
            echo "**KDE Neon / Debian-based:**"
            echo '```bash'
            echo "sudo dpkg -i plasmazones_${VERSION}-*_amd64.deb"
            echo "sudo apt-get install -f  # Install dependencies if needed"
            echo '```'
            echo ""
            echo "**Fedora (COPR):**"
            echo '```bash'
            echo "sudo dnf copr enable fuddlesworth/PlasmaZones"
            echo "sudo dnf install plasmazones"
            echo '```'
            echo ""
            echo "**Fedora (manual RPM):**"
            echo '```bash'
            echo "# Fedora 44"
            echo "sudo dnf install plasmazones-${VERSION}-*.fc44.x86_64.rpm"
            echo '```'
            echo ""
            echo "**openSUSE Tumbleweed (manual RPM):**"
            echo '```bash'
            echo "sudo zypper install plasmazones-${VERSION}-*.x86_64.rpm"
            echo '```'
            echo ""
            echo "**openSUSE Tumbleweed (OBS):**"
            echo '```bash'
            echo "sudo zypper addrepo https://download.opensuse.org/repositories/home:fuddlesworth/openSUSE_Tumbleweed/home:fuddlesworth.repo"
            echo "sudo zypper refresh"
            echo "sudo zypper install plasmazones"
            echo '```'
            echo ""
            echo "**Universal Linux (AppDir):**"
            echo "For Fedora Atomic, Steam Deck, or non-root user installation:"
            echo '```bash'
            echo "tar xzf plasmazones-${VERSION}-linux-x86_64.tar.gz"
            echo "cd plasmazones-linux-x86_64"
            echo "./install.sh"
            echo '```'
            echo ""
            echo "**NixOS (flake):**"
            echo '```nix'
            echo "# flake.nix inputs"
            echo "plasmazones.url = \"github:fuddlesworth/PlasmaZones\";"
            echo ""
            echo "# configuration.nix"
            echo "programs.plasmazones.enable = true;"
            echo '```'
            echo ""
            echo "**NixOS (standalone):**"
            echo "Download \`plasmazones.nix\` from the release assets, then:"
            echo '```nix'
            echo "# configuration.nix"
            echo "environment.systemPackages = ["
            echo "  (pkgs.callPackage ./plasmazones.nix {})"
            echo "];"
            echo '```'
            echo ""
            echo "### Post-Installation"
            echo ""
            echo '```bash'
            echo "systemctl --user enable --now plasmazones.service"
            echo "systemsettings kcm_plasmazones"
            echo '```'
          } > release_notes.md

      - name: Delete existing release if present
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="v${{ needs.version.outputs.version }}"
          if gh release view "$VERSION" &>/dev/null; then
            echo "Release $VERSION already exists — deleting so we can recreate with assets"
            gh release delete "$VERSION" --yes
          fi

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
          IS_PRERELEASE: ${{ needs.version.outputs.is_prerelease }}
        run: |
          set -euo pipefail
          VERSION="v${{ needs.version.outputs.version }}"
          # Source the pre-release verdict from the version job so this
          # workflow has one regex / one decision point — see the version
          # job's `is_prerelease` output.
          # Collect all release assets
          ASSETS=()
          while IFS= read -r f; do
            ASSETS+=("$f")
          done < <(find artifacts -type f \( -name '*.deb' -o -name '*.ddeb' -o -name '*.rpm' -o -name '*.pkg.tar.zst' -o -name '*linux-x86_64.tar.gz' -o -name 'plasmazones.nix' \))

          echo "Uploading ${#ASSETS[@]} assets:"
          printf '  %s\n' "${ASSETS[@]}"

          # --latest implies "this is the canonical stable release";
          # gh refuses to combine it with --prerelease. Build the flag
          # list as an array so empty entries don't add stray empty
          # arguments to the command line.
          RELEASE_FLAGS=()
          if [[ "$IS_PRERELEASE" == "true" ]]; then
              RELEASE_FLAGS+=(--prerelease)
          else
              RELEASE_FLAGS+=(--latest)
          fi
          gh release create "$VERSION" \
            --title "PlasmaZones $VERSION" \
            --notes-file release_notes.md \
            "${RELEASE_FLAGS[@]}" \
            "${ASSETS[@]}"

  # ═══════════════════════════════════════════════════════════════════════════
  # Publish to AUR (Arch User Repository)
  # ═══════════════════════════════════════════════════════════════════════════
  publish-aur:
    name: Publish to AUR
    needs: [version, release, build-generic]
    runs-on: ubuntu-latest
    # Skip AUR publish for pre-releases. Single source of truth: the
    # version job's `is_prerelease` output — keeps this in sync with
    # the GH release's `--prerelease` flag automatically.
    if: needs.version.outputs.is_prerelease != 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download generic tarball artifact
        uses: actions/download-artifact@v8
        with:
          name: generic-linux-tarball
          path: dist

      - name: Calculate tarball hash
        id: hash
        run: |
          set -euo pipefail
          # Use a nullglob array instead of `ls | head -1` so a missing
          # tarball fails the step explicitly instead of feeding empty
          # input into sha256sum and producing a bogus hash.
          shopt -s nullglob
          arr=(dist/plasmazones-*-linux-x86_64.tar.gz)
          if [[ ${#arr[@]} -eq 0 ]]; then
              echo "Error: no plasmazones-*-linux-x86_64.tar.gz under dist/" >&2
              exit 1
          fi
          TARBALL="${arr[0]}"
          SHA256=$(sha256sum "$TARBALL" | cut -d' ' -f1)
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "Tarball: $TARBALL"
          echo "SHA256: $SHA256"

      - name: Setup SSH for AUR
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          cat >> ~/.ssh/config << 'EOF'
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
            StrictHostKeyChecking accept-new
          EOF
          chmod 600 ~/.ssh/config

      - name: Clone and update AUR repository (plasmazones-bin)
        env:
          VERSION: ${{ needs.version.outputs.version }}
          SHA256: ${{ steps.hash.outputs.sha256 }}
          KWIN_VERSION: ${{ needs.build-generic.outputs.kwin-version }}
        run: |
          git clone ssh://aur@aur.archlinux.org/plasmazones-bin.git /tmp/aur-bin
          cd /tmp/aur-bin

          # Copy files from source repo
          cp "$GITHUB_WORKSPACE/packaging/arch/PKGBUILD.bin" ./PKGBUILD
          cp "$GITHUB_WORKSPACE/packaging/arch/plasmazones.install" ./
          cp "$GITHUB_WORKSPACE/packaging/arch/LICENSE" ./

          # Update version and hash. Use the same awk-anchored array
          # rewrite as the source PKGBUILD (below) so future additional
          # `source=` entries don't silently leave a stale second hash.
          # Also pin _kwin_ver to the exact KWin this binary was built
          # against — the effect plugin IID embeds KWin's version string.
          sed -i "s/^pkgver=.*/pkgver=$VERSION/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          awk -v sum="$SHA256" '
            # Single-line form: sha256sums=(\047hash\047) — replace inline.
            /^sha256sums=\(.*\)$/ {
              print "sha256sums=(\047" sum "\047)"
              next
            }
            # Multi-line form: opening `sha256sums=(` on its own line,
            # then entries, then a `)` on its own line.
            /^sha256sums=\(/ {
              print "sha256sums=("
              print "    \047" sum "\047"
              print ")"
              in_block = 1
              next
            }
            in_block && /^\)/ { in_block = 0; next }
            in_block { next }
            { print }
          ' PKGBUILD > PKGBUILD.new && mv PKGBUILD.new PKGBUILD
          sed -i "s/^_kwin_ver=.*/_kwin_ver=$KWIN_VERSION/" PKGBUILD

          # Generate .SRCINFO (mount files read-only to avoid chown breaking host git).
          # Enumerate inputs explicitly rather than `cp /build/*` so a future
          # mount-path tweak fails loudly instead of producing a .SRCINFO from
          # whatever happens to be lying around.
          docker run --rm \
            -v "$(pwd)/PKGBUILD:/build/PKGBUILD:ro" \
            -v "$(pwd)/plasmazones.install:/build/plasmazones.install:ro" \
            archlinux:latest bash -c "
            set -euo pipefail
            pacman -Syu --noconfirm >&2
            useradd -m builder
            cp /build/PKGBUILD /build/plasmazones.install /home/builder/
            chown builder:builder /home/builder/PKGBUILD /home/builder/plasmazones.install
            su builder -c 'cd /home/builder && makepkg --printsrcinfo'
          " > .SRCINFO

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update to $VERSION"
            git push
            echo "✅ Published plasmazones-bin $VERSION to AUR"
          fi

      - name: Clone and update AUR repository (plasmazones - source)
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          git clone ssh://aur@aur.archlinux.org/plasmazones.git /tmp/aur-src
          cd /tmp/aur-src

          # Copy files from source repo
          cp "$GITHUB_WORKSPACE/packaging/arch/PKGBUILD" ./
          cp "$GITHUB_WORKSPACE/packaging/arch/plasmazones.install" ./
          cp "$GITHUB_WORKSPACE/packaging/arch/LICENSE" ./

          # Update version
          sed -i "s/^pkgver=.*/pkgver=$VERSION/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

          # Calculate and update source tarball hash. Anchor inside the
          # sha256sums=(...) block via awk so future additional hashes
          # (e.g. for the .install file) aren't silently left stale.
          TARBALL_URL="https://github.com/fuddlesworth/PlasmaZones/archive/refs/tags/v${VERSION}.tar.gz"
          # Stage the tarball to disk first so we can detect both curl
          # failures and pipe-side errors. Piping `curl | sha256sum`
          # silently produces a hash of empty input when curl 404s.
          tmptar=$(mktemp)
          # --retry-all-errors covers 4xx (GitHub asset propagation race
          # right after the tag push) and connection refused; --max-time
          # bounds the worst case so the workflow doesn't hang.
          curl -fsSL --retry 5 --retry-all-errors --retry-delay 5 --max-time 120 \
              -o "$tmptar" "$TARBALL_URL"
          TARBALL_SHA256=$(sha256sum "$tmptar" | cut -d' ' -f1)
          rm -f "$tmptar"
          echo "Source tarball SHA256: $TARBALL_SHA256"
          awk -v sum="$TARBALL_SHA256" '
            # Single-line form: sha256sums=(\047hash\047) — replace inline.
            /^sha256sums=\(.*\)$/ {
              print "sha256sums=(\047" sum "\047)"
              next
            }
            # Multi-line form: opening `sha256sums=(` on its own line, then
            # entries, then a `)` on its own line. Replace the entire array
            # with a single sum (the source tarball). Add more entries here
            # when PKGBUILD grows additional source= lines.
            /^sha256sums=\(/ {
              print "sha256sums=("
              print "    \047" sum "\047"
              print ")"
              in_block = 1
              next
            }
            in_block && /^\)/ { in_block = 0; next }
            in_block { next }
            { print }
          ' PKGBUILD > PKGBUILD.new && mv PKGBUILD.new PKGBUILD

          # Generate .SRCINFO (mount files read-only to avoid chown breaking host git).
          # Enumerate inputs explicitly — see the matching note in
          # publish-aur-bin above.
          docker run --rm \
            -v "$(pwd)/PKGBUILD:/build/PKGBUILD:ro" \
            -v "$(pwd)/plasmazones.install:/build/plasmazones.install:ro" \
            archlinux:latest bash -c "
            set -euo pipefail
            pacman -Syu --noconfirm >&2
            useradd -m builder
            cp /build/PKGBUILD /build/plasmazones.install /home/builder/
            chown builder:builder /home/builder/PKGBUILD /home/builder/plasmazones.install
            su builder -c 'cd /home/builder && makepkg --printsrcinfo'
          " > .SRCINFO

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update to $VERSION"
            git push
            echo "✅ Published plasmazones $VERSION to AUR"
          fi

  # ═══════════════════════════════════════════════════════════════════════════
  # Publish to openSUSE Build Service (OBS)
  # ═══════════════════════════════════════════════════════════════════════════
  # Commits the spec + _service to the home:fuddlesworth/plasmazones OBS
  # package; OBS then fetches the release tarball (via the download_files
  # source service) and rebuilds for every enabled repository. Gated on the
  # GitHub release being created, so all distro builds (including the
  # openSUSE Tumbleweed RPM smoke build) must succeed first — a spec that
  # fails to build is never pushed to the repo users have added with
  # `zypper addrepo`, and we don't publish to OBS for a release that never
  # made it to GitHub. Runs in parallel with publish-aur.
  #
  # Setup (one-time):
  #   1. Sign in at https://build.opensuse.org with an openSUSE account.
  #   2. Create project "home:fuddlesworth" and package "plasmazones"
  #      (Home Project -> Create Package), or via osc:
  #        osc meta pkg -e home:fuddlesworth plasmazones
  #   3. In the project's "Repositories" tab add openSUSE_Tumbleweed for
  #      x86_64 and aarch64. PlasmaZones needs Plasma/KF6/Qt 6.7+, so Leap
  #      is not a viable target — Tumbleweed (and optionally Slowroll) only.
  #   4. Add two GitHub Actions secrets (Settings -> Secrets and variables
  #      -> Actions):
  #        OBS_USERNAME — your build.opensuse.org login
  #        OBS_PASSWORD — that account's password
  #   5. Optionally retire the old home:ilFrance/plasmazones package so
  #      users are not split across two repositories.
  publish-obs:
    name: Publish to openSUSE OBS
    # `release` already transitively requires build-rpm-opensuse + every
    # other distro build, so gating here on `release` keeps the smoke-test
    # gate while also blocking publish if the GitHub release itself fails.
    # Same shape as publish-aur so the two run as parallel siblings.
    needs: [version, release]
    runs-on: ubuntu-latest
    # Skip pre-releases — the home:fuddlesworth repo users add with
    # `zypper addrepo` is a stable channel. Single source of truth: the
    # version job's `is_prerelease` output, same as publish-aur.
    if: needs.version.outputs.is_prerelease != 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install osc (OBS command-line client)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends osc

      - name: Configure osc credentials
        env:
          OBS_USERNAME: ${{ secrets.OBS_USERNAME }}
          OBS_PASSWORD: ${{ secrets.OBS_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${OBS_USERNAME:-}" || -z "${OBS_PASSWORD:-}" ]]; then
              echo "Error: OBS_USERNAME / OBS_PASSWORD secrets are not set" >&2
              exit 1
          fi
          # Pin the plaintext credentials manager: without it osc falls
          # back to an interactive keyring prompt on the first API call,
          # which hangs the runner. The file is chmod 600 and lives only
          # on the ephemeral CI VM; GitHub masks the secret values in logs.
          mkdir -p ~/.config/osc
          cat > ~/.config/osc/oscrc << EOF
          [general]
          apiurl = https://api.opensuse.org

          [https://api.opensuse.org]
          credentials_mgr_class = osc.credentials.PlaintextConfigFileCredentialsManager
          user = $OBS_USERNAME
          pass = $OBS_PASSWORD
          EOF
          chmod 600 ~/.config/osc/oscrc

      - name: Stamp version and changelog into spec
        run: |
          set -euo pipefail
          VERSION="${{ needs.version.outputs.version }}"
          # OBS builds from the committed spec, so it must carry the real
          # version (download_files resolves Source0's %{version}) and the
          # release changelog — not the 0.0.0 placeholder. Same templating
          # as the build-rpm-opensuse job above.
          sed -i "s/^Version:.*/Version:        $VERSION/" packaging/rpm/plasmazones.spec
          bash packaging/generate-changelog.sh rpm

      - name: Commit package to OBS
        env:
          OBS_PROJECT: home:fuddlesworth
        run: |
          set -euo pipefail
          VERSION="${{ needs.version.outputs.version }}"
          # Check out the existing OBS package working copy — the project
          # and package must already exist (see the setup notes above).
          osc checkout "$OBS_PROJECT" plasmazones
          PKGDIR="$OBS_PROJECT/plasmazones"
          cp packaging/rpm/plasmazones.spec "$PKGDIR/plasmazones.spec"
          cp packaging/rpm/plasmazones-rpmlintrc "$PKGDIR/plasmazones-rpmlintrc"
          cp packaging/obs/_service "$PKGDIR/_service"
          cd "$PKGDIR"
          # addremove stages new files and drops removed ones; commit only
          # when something actually changed so re-running the same tag is a
          # no-op rather than an empty commit. OBS reruns the source service
          # and rebuilds automatically on every source commit.
          osc addremove
          # Capture status on its own line: a failing `osc status` then
          # aborts the job under `set -e`, instead of being read as an
          # empty result and silently mistaken for "no changes".
          STATUS="$(osc status)"
          if [[ -n "$STATUS" ]]; then
              osc commit -m "Update to $VERSION"
              echo "✅ Committed plasmazones $VERSION to $OBS_PROJECT — OBS will rebuild"
          else
              echo "No changes to commit"
          fi

  # ═══════════════════════════════════════════════════════════════════════════
  # COPR (Fedora Community Packages)
  # ═══════════════════════════════════════════════════════════════════════════
  # COPR builds are triggered automatically via GitHub webhook (no CI job needed).
  # When a tag is pushed, GitHub sends a webhook to COPR, which clones the repo
  # at that tag, runs .copr/Makefile to produce the SRPM, and builds RPMs for
  # all enabled chroots (Fedora 43, Fedora 44, Rawhide, etc.).
  #
  # Setup (one-time):
  #   1. Create COPR project "plasmazones" at copr.fedorainfracloud.org
  #   2. Add package with SCM source, Clone URL = this repo,
  #      Spec = packaging/rpm/plasmazones.spec, Method = make_srpm
  #   3. Enable "Auto-rebuild" on the package
  #   4. Copy the webhook URL from COPR project Settings → Webhooks
  #   5. Add it as a GitHub webhook (Settings → Webhooks → Add webhook):
  #      - Payload URL: <copr webhook URL>/plasmazones
  #      - Content type: application/json
  #      - Events: "Branch or tag creation"
