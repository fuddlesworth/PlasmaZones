# Auto-update flake.lock weekly to keep nixpkgs fresh
# SPDX-FileCopyrightText: 2026 fuddlesworth
# SPDX-License-Identifier: GPL-3.0-or-later

name: Update flake.lock

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Update flake.lock
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        # cachix/install-nix-action v31 — pinned by SHA so a hijacked
        # tag can't run arbitrary code in this workflow's write-scoped
        # context.
        uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update flake.lock
        # DeterminateSystems/update-flake-lock v28 — pinned by SHA, same
        # rationale. Bump when verifying a newer commit on the action.
        uses: DeterminateSystems/update-flake-lock@834c491b2ece4de0bbd00d85214bb5e83b4da5c6
        with:
          pr-title: "chore(nix): update flake.lock"
          pr-labels: dependencies,nix
          pr-assignees: fuddlesworth
          pr-reviewers: fuddlesworth
