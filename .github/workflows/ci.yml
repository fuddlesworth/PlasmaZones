# PlasmaZones CI Pipeline
# Builds on Arch + a stable distro across both USE_KDE_FRAMEWORKS modes,
# with BUILD_TOOLS=ON to exercise the shader-render tool. Tests run under
# QT_QPA_PLATFORM=offscreen so QML-touching tests don't need a display.
# SPDX-FileCopyrightText: 2026 fuddlesworth
# SPDX-License-Identifier: GPL-3.0-or-later

name: CI

on:
  push:
    branches: [main, develop, v3, v3.1, v3.2]
  pull_request:
    branches: [main, v3, v3.1, v3.2]
    # `labeled` is opt-in for the draft-PKGBUILD job below — it gates
    # on `github.event.label.name == 'build-draft'`. The other jobs
    # (build / lint / nix) skip the `labeled` action subtype via their
    # own `if:` filter so adding or removing a label doesn't trigger
    # a redundant build/lint/nix matrix run. Only the four canonical
    # PR subtypes are subscribed; `unlabeled` would just cancel a
    # build the maintainer already wanted, so we don't subscribe.
    types: [opened, synchronize, reopened, labeled]
  # `workflow_dispatch` so we can hand-fire the draft-arch packaging
  # job against an arbitrary ref (e.g. a back-ported hot-fix branch
  # that isn't yet in a PR). The build / lint / nix jobs explicitly
  # skip this trigger via their `if:` filter so a manual dispatch of
  # the packaging job doesn't double-build the matrix.
  workflow_dispatch:

# Default workflow token is read-only; jobs that need writes opt in.
permissions:
  contents: read

jobs:
  build:
    name: Build (arch, KDE_FRAMEWORKS=${{ matrix.kde }})
    # Skip `labeled` and `unlabeled` PR events (those are reserved for
    # the draft-PKGBUILD job below) and skip `workflow_dispatch` (which
    # also only targets the draft-PKGBUILD job). Run on every push and
    # on the canonical PR action subtypes (opened, synchronize,
    # reopened) — same coverage as before, just gated explicitly so
    # the new label-driven trigger doesn't double-fire the matrix.
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'labeled' && github.event.action != 'unlabeled')
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    strategy:
      fail-fast: false
      matrix:
        kde: [ON, OFF]

    steps:
      - name: Setup (Arch)
        run: |
          set -euo pipefail
          # Full -Syu prevents partial-upgrade state that can break linked
          # libs against stale base packages — Arch's standard guidance.
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            git base-devel ccache \
            cmake ninja extra-cmake-modules \
            qt6-base qt6-declarative qt6-tools qt6-shadertools qt6-svg \
            qt6-wayland wayland plasma-wayland-protocols wayland-protocols \
            kwin \
            kconfig kconfigwidgets kcmutils kglobalaccel kirigami \
            plasma-activities \
            vulkan-headers vulkan-icd-loader glslang \
            xorg-server-xvfb mesa cava ffmpeg

      - name: Checkout
        uses: actions/checkout@v6

      # ccache: BIG win on PR rebuilds with unity-build + LTO; without it
      # every PR pays a 10-15 min cold compile.
      - name: ccache
        # hendrikmuhs/ccache-action v1.2.18 — SHA-pin third-party actions
        # so a hijacked tag can't run arbitrary code in our build matrix.
        uses: hendrikmuhs/ccache-action@a1209f81afb8c005c13b4296c32e363431bffea5
        with:
          # Matrix is single-distro (arch only) so the ccache key is just
          # the kde toggle. Adding a second distro to the matrix above
          # needs a matching prefix here so the per-distro caches stay
          # isolated — `${{ matrix.distro }}-${{ matrix.kde }}` was the
          # earlier shape but `matrix.distro` is empty today, producing
          # a misleading `-ON` / `-OFF` key.
          key: arch-${{ matrix.kde }}
          max-size: 500M

      - name: Configure
        env:
          CC: ccache gcc
          CXX: ccache g++
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DUSE_KDE_FRAMEWORKS=${{ matrix.kde }} \
            -DBUILD_TESTING=ON \
            -DBUILD_TOOLS=ON

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Test
        env:
          # QML tests instantiate QQuickWindow; offscreen QPA keeps them
          # headless without xvfb. Tests that need an RHI surface (e.g.
          # shader-render tool tests) launch xvfb-run themselves.
          QT_QPA_PLATFORM: offscreen
          # Force Mesa's software rasteriser (llvmpipe) so the GL-dependent
          # shader-bake test (test_animation_shader_kwin_bake) gets a real
          # GL >= 4.5 context on this headless runner and actually compiles the
          # KWin-branch shaders instead of QSKIP-ing. mesa is installed above.
          LIBGL_ALWAYS_SOFTWARE: "1"
        run: |
          # The container has no session, so XDG_RUNTIME_DIR is unset and Qt
          # emits a "QStandardPaths: XDG_RUNTIME_DIR not set" warning the first
          # time QStandardPaths is queried. Tests that capture warnings and
          # assert none were emitted (e.g. the plugin-loader rejection cases)
          # would otherwise pick that stray warning up and fail. Give it a
          # private 0700 dir, as a real session would.
          export XDG_RUNTIME_DIR="$(mktemp -d)"
          # xvfb is available for tests that explicitly need a Wayland/X
          # surface (offscreen QPA can't host RHI textures).
          # Parallel ctest with $(nproc); xvfb-run wraps when available so
          # surface-needing tests have a display.
          if command -v xvfb-run >/dev/null 2>&1; then
            xvfb-run -a ctest --test-dir build --output-on-failure -j "$(nproc)"
          else
            ctest --test-dir build --output-on-failure -j "$(nproc)"
          fi

      - name: Install (DESTDIR)
        run: DESTDIR="${PWD}/install" cmake --install build

      - name: Verify installed files
        run: |
          echo "=== Installed files ==="
          find install -type f | sort

  # ─── Build shell: the phosphor-shell line (libs/phosphor-shell + the
  # gated phosphor-service-* libs + the example shell) is opt-in behind
  # BUILD_PHOSPHOR_SHELL and therefore NOT exercised by the default `build`
  # job. This job turns the gate ON so the Phase 1.5 / Phase 2 service libs
  # are actually compiled and their (CI-safe) tests run. KDE_FRAMEWORKS=ON
  # because the shell consumes KF6 (kglobalaccel / kirigami / activities).
  # Extra deps over the `build` job: libpipewire (2.1 mixer), polkit-qt6
  # (2.6 agent), pam (2.9 lock), ddcutil (2.4 brightness DDC extension).
  build-shell:
    name: Build shell (arch, BUILD_PHOSPHOR_SHELL=ON)
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'labeled' && github.event.action != 'unlabeled')
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Setup (Arch)
        run: |
          set -euo pipefail
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            git base-devel ccache \
            cmake ninja extra-cmake-modules \
            qt6-base qt6-declarative qt6-tools qt6-shadertools qt6-svg \
            qt6-wayland wayland plasma-wayland-protocols wayland-protocols \
            kwin \
            kconfig kconfigwidgets kcmutils kglobalaccel kirigami \
            plasma-activities \
            vulkan-headers vulkan-icd-loader glslang \
            xorg-server-xvfb mesa cava ffmpeg \
            libpipewire polkit-qt6 pam ddcutil

      - name: Checkout
        uses: actions/checkout@v6

      - name: ccache
        uses: hendrikmuhs/ccache-action@a1209f81afb8c005c13b4296c32e363431bffea5
        with:
          key: arch-shell
          max-size: 500M

      - name: Configure
        env:
          CC: ccache gcc
          CXX: ccache g++
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DUSE_KDE_FRAMEWORKS=ON \
            -DBUILD_PHOSPHOR_SHELL=ON \
            -DBUILD_TESTING=ON \
            -DBUILD_TOOLS=ON

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Test
        env:
          QT_QPA_PLATFORM: offscreen
          # Software GL (llvmpipe) so the shader-bake test gets a GL >= 4.5
          # context instead of QSKIP-ing (see the default build job's rationale).
          LIBGL_ALWAYS_SOFTWARE: "1"
        run: |
          # Private XDG_RUNTIME_DIR so Qt's "XDG_RUNTIME_DIR not set" warning
          # does not pollute tests that assert no warnings (see the default
          # build job's Test step for the full rationale).
          export XDG_RUNTIME_DIR="$(mktemp -d)"
          # Same headless pattern as the default build job. Most service-lib
          # tests QSKIP when no live session/system bus is present, but two
          # smoke tests assert against a live environment the container does
          # not have and cannot fake:
          #   - phosphorservicebluetooth_smoke expects a connected session bus
          #     (testHostExposesAgentWhenBusConnected), absent here;
          #   - phosphorservicepipewire_smoke's no-daemon branch asserts no
          #     error signal, but connecting with no PipeWire daemon emits one.
          # Both pass on a developer host with a bus + PipeWire. Exclude them
          # from this job (the gate-ON build still compiles and exercises every
          # other Phase 2 test). Making them QSKIP-aware is the proper follow-up.
          EXCLUDE='phosphorservicepipewire_smoke|phosphorservicebluetooth_smoke'
          if command -v xvfb-run >/dev/null 2>&1; then
            xvfb-run -a ctest --test-dir build --output-on-failure -j "$(nproc)" -E "$EXCLUDE"
          else
            ctest --test-dir build --output-on-failure -j "$(nproc)" -E "$EXCLUDE"
          fi

  # ─── Lint: clang-format + qmlformat mirror the lefthook hooks so a
  # contributor who skipped them can't merge unformatted code. Only
  # lints files changed in the PR (or HEAD~1..HEAD for direct pushes)
  # so the historical tree's pre-existing formatting drift doesn't
  # block unrelated PRs.
  #
  # Runs in an Arch container so clang-format ships from the same
  # `clang` package that contributors use locally (KDE/Plasma devs are
  # overwhelmingly on Arch / rolling distros). clang-format's
  # SpaceInEmptyBlock-style behaviour diverges between major versions
  # (notably 18 vs 22 for empty lambda bodies and 22 vs 19/20 for
  # initializer-list packing), so pinning CI to whatever Ubuntu ships
  # would force every contributor to also keep an older clang-format
  # on PATH for the pre-commit hook to agree with CI.
  lint:
    name: Lint
    # Same trigger gate as `build` — skip label-change events and
    # workflow_dispatch (both reserved for the draft-PKGBUILD job).
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'labeled' && github.event.action != 'unlabeled')
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Setup (Arch)
        run: |
          set -euo pipefail
          # Match the build job's full -Syu — partial-upgrade state
          # can leave clang dynamically linked against stale base libs.
          pacman -Syu --noconfirm
          # `clang` package contains clang-format (no separate
          # clang-format package on Arch). `qt6-declarative` provides
          # qmlformat. `git` is needed for the diff range and isn't
          # preinstalled in the base archlinux image.
          pacman -S --noconfirm --needed clang qt6-declarative git
          clang-format --version

      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Need the base commit to diff against. Shallow clone doesn't
          # have it; fetch the full history for the lint diff.
          fetch-depth: 0

      - name: Resolve changed files
        id: changed
        run: |
          set -euo pipefail
          # Container runs as root but the checkout files are owned by a
          # different UID — git refuses operations on "dubiously owned"
          # repos. Whitelist the workspace so the diff/fetch below run.
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          # Pick the right diff range for the trigger.
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              BASE="origin/${{ github.base_ref }}"
              git fetch origin "${{ github.base_ref }}" --depth=1 || true
              RANGE="$BASE...HEAD"
          else
              # Direct push — diff against the previous commit on this ref.
              RANGE="HEAD~1...HEAD"
          fi
          echo "Diff range: $RANGE"
          # Filter to source files we actually format, exclude
          # generator-output headers (they get regenerated, no point
          # round-tripping clang-format against them).
          git diff --name-only --diff-filter=ACMR "$RANGE" -- \
              '*.cpp' '*.h' '*.qml' \
            | grep -v '^libs/.*/include/.*_export\.h$' \
            > changed.txt || true
          echo "Changed files:"
          cat changed.txt
          # Emit the file list for the downstream steps.
          echo "list=changed.txt" >> "$GITHUB_OUTPUT"

      - name: clang-format
        run: |
          set -euo pipefail
          mapfile -t files < <(grep -E '\.(cpp|h)$' changed.txt || true)
          if [ "${#files[@]}" -gt 0 ]; then
            clang-format --dry-run -Werror "${files[@]}"
          else
            echo "No C++ files changed — skipping clang-format"
          fi

      - name: qmlformat
        run: |
          set -euo pipefail
          # Arch's qt6-declarative installs qmlformat under
          # /usr/lib/qt6/bin (not /usr/bin), so PATH doesn't pick it
          # up by default. Prepend the qt6 bin dir for this step.
          export PATH="/usr/lib/qt6/bin:$PATH"
          mapfile -t files < <(grep -E '\.qml$' changed.txt || true)
          if [ "${#files[@]}" -gt 0 ]; then
            qmlformat -n "${files[@]}"
          else
            echo "No QML files changed — skipping qmlformat"
          fi

  # ─── JSON Schema: validate every bundled data file against the committed
  # schemas under data/schemas/. These are the same schema files runtime
  # validation compiles (phosphor-fsloader's SchemaValidator via valijson), so
  # this is the author-time gate that keeps malformed layouts (and future
  # document types) out of the tree. Mirrors the lefthook `json-schema` hook;
  # hard gate here, best-effort there. Validates the full set on every run
  # (cheap) so a schema change re-checks all governed documents.
  json-schema:
    name: JSON Schema
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'labeled' && github.event.action != 'unlabeled')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install jsonschema
        # The [format] extra matches the lefthook bootstrap venv and enables
        # string-format checks (e.g. format:"date"), so CI and the local hook
        # validate identical surfaces.
        run: pip install "jsonschema[format]"

      - name: Validate bundled data against schemas
        run: python3 scripts/validate-json-schemas.py

  # ─── Luau static analysis: type-check + lint the bundled tiling algorithms
  # and the pluau standard library with luau-analyze. Catches parse and type
  # errors (a broken bundled .luau would otherwise only surface at runtime as
  # a silently-skipped algorithm). The analyzer is built from the committed
  # vendored Luau (extern/luau-*.tar.gz) so the lint/type ruleset is pinned exactly to
  # the runtime we ship — analysis stays deterministic across CI runs and only
  # changes when we deliberately bump the vendored Luau.
  #
  # The bundled algorithms consume `pluau` as an injected global; data/algorithms/
  # .luaurc declares it so the analyzer resolves it (pluau.luau itself *defines*
  # the global and is analyzed under the default config, which luau-analyze
  # picks per-file from the nearest .luaurc).
  luau-analyze:
    name: Luau analyze
    # Same trigger gate as build / lint.
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'labeled' && github.event.action != 'unlabeled')
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Setup (Arch)
        run: |
          set -euo pipefail
          pacman -Syu --noconfirm
          # cmake/ninja/gcc build luau-analyze from the vendored source; git is
          # needed because the base image doesn't ship it.
          pacman -S --noconfirm --needed git cmake ninja gcc

      - name: Checkout
        uses: actions/checkout@v6

      - name: Build luau-analyze from vendored Luau
        run: |
          set -euo pipefail
          # Luau is vendored as a committed tarball; extract it before building
          # the analyzer CLI from it (same source the runtime links).
          mkdir -p luau-src
          tar xzf extern/luau-*.tar.gz -C luau-src --strip-components=1
          cmake -S luau-src -B luau-cli -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLUAU_BUILD_CLI=ON \
            -DLUAU_BUILD_TESTS=OFF \
            -DLUAU_BUILD_WEB=OFF
          cmake --build luau-cli --target Luau.Analyze.CLI --parallel "$(nproc)"

      - name: Analyze bundled algorithms + pluau stdlib
        run: |
          set -euo pipefail
          # Non-zero exit on any parse/type error fails the job. Lint findings
          # are advisory (lintErrors:false in .luaurc) but still printed.
          ./luau-cli/luau-analyze \
            data/algorithms/*.luau \
            libs/phosphor-tiles/src/pluau/pluau.luau

  # ═══════════════════════════════════════════════════════════════════════════
  # Nix Flake CI (x86_64 + aarch64)
  # ═══════════════════════════════════════════════════════════════════════════
  nix:
    name: Nix (${{ matrix.system }})
    # Same trigger gate as `build` / `lint`.
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'labeled' && github.event.action != 'unlabeled')
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-latest
          - system: aarch64-linux
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72  # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Show flake outputs
        run: nix flake show

      # --fallback: build from source if a binary substitute fails. Guards
      # against transient cache.nixos.org corruption (e.g. a hash mismatch on a
      # transitive dep's NAR) turning an otherwise-fine build red.
      - name: Flake check
        run: nix flake check -L --fallback

      - name: Build default package
        run: nix build -L --fallback .#default

      - name: Verify binary
        run: |
          echo "=== Package contents ==="
          ls -la result/bin/
          ./result/bin/plasmazonesd --version || true

      - name: Verify devShell
        run: nix develop --fallback -c echo "devShell OK"

  # ═══════════════════════════════════════════════════════════════════════════
  # Draft Arch Package (opt-in PR builds)
  # ─────────────────────────────────────────────────────────────────────────
  # Manual-only. Two ways to fire:
  #
  #   1. Add the `build-draft` label to an open PR. The job fires once
  #      per `labeled` event, posts the sticky comment with install
  #      instructions and the nightly.link artifact URLs. Push events on
  #      the PR (`synchronize`) DO NOT auto-rebuild — to refresh the
  #      build against new commits, remove and re-add the label. The
  #      sticky comment shows the commit SHA the build was made from so
  #      a stale build is visible at a glance.
  #
  #   2. Actions UI → Run workflow (workflow_dispatch). No PR context is
  #      auto-derived: pkgver falls back to `…prmanual.r…`, no sticky
  #      comment is posted on any PR (the comment step gates on the
  #      `pull_request` event). Use this for back-port hot-fix branches
  #      that aren't yet in a PR, or to test the packaging job itself.
  #
  # The package uses pkgname=plasmazones-pr with provides+conflicts on
  # plasmazones, so a tester can swap between any PR build and the stable
  # release with a single `pacman -U` / `pacman -S plasmazones` round-trip.
  # Version derives from the upstream pkgver + PR number + commit count +
  # short SHA so successive re-runs against the same PR sort monotonically.
  # Publishes:
  #   1) the built package (artifact `arch-draft-package`)
  #   2) a hand-off PKGBUILD that pulls the PR branch via `git+#branch=…`
  #      so testers without binary trust can `makepkg -si` instead
  #      (artifact `arch-draft-pkgbuild`)
  #   3) a sticky PR comment (label trigger only) with one-line install
  #      commands for both paths.
  # ═══════════════════════════════════════════════════════════════════════════
  build-arch-draft:
    name: Draft Arch package
    # Manual triggers only: explicit `build-draft` label on a PR OR
    # workflow_dispatch from the Actions UI. Push events, opened /
    # synchronize / reopened PR events, and labels with any other name
    # are all skipped. The label-name gate is load-bearing: without it
    # any label add (e.g. "needs-review", "blocked") would fire a CI
    # build, which both wastes runner minutes and could surprise PR
    # authors who didn't ask for one.
    if: |
      github.event_name == 'workflow_dispatch'
      || (github.event_name == 'pull_request' && github.event.action == 'labeled' && github.event.label.name == 'build-draft')
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    permissions:
      contents: read
      # Required so the sticky-comment step at the end can post / edit the
      # comment on the PR. No other write surfaces are needed.
      pull-requests: write

    steps:
      - name: Setup build environment
        run: |
          set -euo pipefail
          # Full -Syu to avoid partial-upgrade state (same reasoning as
          # the `build` job above).
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            base-devel git sudo namcap \
            cmake ninja extra-cmake-modules \
            qt6-base qt6-declarative qt6-tools qt6-shadertools qt6-svg \
            qt6-wayland wayland \
            kwin \
            kconfig kconfigwidgets kcmutils kglobalaccel kirigami \
            plasma-activities \
            vulkan-headers vulkan-icd-loader

          # makepkg refuses to run as root.
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history so pkgver() can do `git rev-list --count HEAD`
          # and produce a sortable version.
          fetch-depth: 0
          # On PRs, default checkout is the synthetic merge ref. We want
          # the PR head commit so the draft package mirrors what a tester
          # would clone from the branch.
          # `head.sha` is supplied by GitHub from the head repo's API state
          # (40-char hex), not from anything the PR author can write — safe
          # to interpolate. The `|| github.sha` fallback covers
          # workflow_dispatch where no PR exists.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Resolve build metadata
        id: meta
        # Route every attacker-controllable input (branch ref) through env
        # vars instead of `${{ }}` template substitution. Git ref-format
        # allows `$`, `(`, `)`, backticks, `&`, `|` in branch names, so a
        # malicious PR with `branch=fix$(rm -rf /)` would inject the
        # substitution into bash when `${{ github.head_ref }}` is pasted
        # into a double-quoted shell string. The job grants
        # `pull-requests: write` to post the sticky comment, so a
        # successful injection could exfiltrate GITHUB_TOKEN and abuse it
        # against the PR. Environment variables are read by bash without
        # re-parsing — `$BRANCH_REF` is safe even when the value contains
        # shell metacharacters. Documented as a GHA hardening best
        # practice; see github.com/github/actions-runner-controller#security.
        env:
          HEAD_REF: ${{ github.head_ref }}
          REF_NAME: ${{ github.ref_name }}
          PR_NUMBER_RAW: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          CMAKE_VER=$(sed -n 's/^project(PlasmaZones VERSION \([^ )]*\).*/\1/p' CMakeLists.txt)
          : "${CMAKE_VER:=0.0.0}"

          # workflow_dispatch has no PR number — fall back to "manual" so
          # the version still sorts but is recognisable as a manual run.
          PR_NUMBER="${PR_NUMBER_RAW:-manual}"

          # Prefer HEAD_REF (PR source branch); fall back to REF_NAME for
          # workflow_dispatch. Both come from env (no GHA interpolation
          # into the shell source).
          BRANCH_REF="${HEAD_REF:-$REF_NAME}"

          # Sanity-validate the branch name against the conservative
          # subset of git ref-format we want to flow through pkgver/
          # source URLs. Reject anything outside [A-Za-z0-9._/-]; the
          # injection vector is closed above by env-passing, but a
          # malformed value here would still poison pkgver and the
          # source URL passed to `git+#branch=...`. Belt-and-suspenders.
          if [[ ! "$BRANCH_REF" =~ ^[A-Za-z0-9._/-]+$ ]]; then
            echo "::error::Refusing to build with branch ref containing unsupported characters: $BRANCH_REF"
            exit 1
          fi

          SHORT_SHA=$(git rev-parse --short HEAD)
          COMMIT_COUNT=$(git rev-list --count HEAD)
          # pkgver schema: <cmake>.pr<num>.r<count>.g<sha>
          # Sorts above plain <cmake> stable (more dot-components) and
          # monotonically across force-pushes (count + sha bump).
          PKGVER="${CMAKE_VER}.pr${PR_NUMBER}.r${COMMIT_COUNT}.g${SHORT_SHA}"

          # KWin pin must match the version available in the build env so
          # the kwin-effect plugin's IID matches the tester's KWin at
          # install time. CI's Arch image always has the latest, which is
          # also what most rolling-release testers will have.
          KWIN_VER=$(pacman -Q kwin | awk '{print $2}' | cut -d- -f1)

          {
            echo "pkgver=$PKGVER"
            echo "pr_number=$PR_NUMBER"
            echo "branch_ref=$BRANCH_REF"
            echo "short_sha=$SHORT_SHA"
            echo "kwin_ver=$KWIN_VER"
          } >> "$GITHUB_OUTPUT"

          echo "Building plasmazones-pr $PKGVER against KWin $KWIN_VER"

      - name: Generate draft PKGBUILD (local-source, CI build)
        # The PKGBUILD makepkg consumes inside CI builds from the
        # already-checked-out tree so we don't pay a second clone. Mirrors
        # release.yml's PKGBUILD.ci pattern but with the PR-aware pkgname,
        # version, and provides/conflicts so a tester can install on top
        # of stable cleanly.
        run: |
          set -euo pipefail
          mkdir -p ci-pkgbuild
          cat > ci-pkgbuild/PKGBUILD <<'PKGBUILD_EOF'
          # PlasmaZones draft build — generated by .github/workflows/ci.yml
          # SPDX-FileCopyrightText: 2026 fuddlesworth
          # SPDX-License-Identifier: GPL-3.0-or-later
          pkgname=plasmazones-pr
          pkgver=__PKGVER__
          pkgrel=1
          pkgdesc="PlasmaZones — draft build for PR #__PR_NUMBER__ (__BRANCH__@__SHORT_SHA__)"
          arch=('x86_64')
          url="https://github.com/fuddlesworth/PlasmaZones"
          license=('GPL-3.0-or-later' 'LGPL-2.1-or-later')
          depends=(
              'qt6-base' 'qt6-declarative' 'qt6-shadertools' 'qt6-svg'
              'kconfig' 'kconfigwidgets' 'kirigami'
              'kcmutils' 'kglobalaccel' 'qt6-wayland'
              'kwin>=6.7.0'
          )
          makedepends=('cmake' 'extra-cmake-modules' 'qt6-tools' 'ninja')
          optdepends=('plasma-activities: activity-based layouts')
          provides=("plasmazones=$pkgver")
          conflicts=('plasmazones' 'plasmazones-git' 'plasmazones-bin')
          source=()
          sha256sums=()
          install=plasmazones.install

          build() {
              cd "$startdir/.."
              cmake -B build -G Ninja \
                  -DCMAKE_BUILD_TYPE=Release \
                  -DCMAKE_INSTALL_PREFIX=/usr \
                  -DCMAKE_INSTALL_LIBDIR=lib \
                  -DBUILD_TESTING=OFF \
                  -Wno-dev
              cmake --build build --parallel
          }

          package() {
              cd "$startdir/.."
              DESTDIR="$pkgdir" cmake --install build
              install -Dm644 packaging/arch/kbuildsycoca.hook \
                  "$pkgdir/usr/share/libalpm/hooks/plasmazones-kbuildsycoca.hook"
              install -Dm755 packaging/arch/plasmazones-refresh-sycoca \
                  "$pkgdir/usr/share/libalpm/scripts/plasmazones-refresh-sycoca"
              install -Dm644 LICENSE        "$pkgdir/usr/share/licenses/$pkgname/LICENSE"
              install -Dm644 COPYING.LESSER "$pkgdir/usr/share/licenses/$pkgname/COPYING.LESSER"
          }
          PKGBUILD_EOF

          # Substitute the placeholders out-of-band (heredoc 'EOF' is
          # quoted to keep $startdir / $pkgdir literal for makepkg).
          sed -i \
              -e "s|__PKGVER__|${{ steps.meta.outputs.pkgver }}|" \
              -e "s|__PR_NUMBER__|${{ steps.meta.outputs.pr_number }}|" \
              -e "s|__BRANCH__|${{ steps.meta.outputs.branch_ref }}|" \
              -e "s|__SHORT_SHA__|${{ steps.meta.outputs.short_sha }}|" \
              ci-pkgbuild/PKGBUILD

          # The pacman install hook is reused verbatim from the stable
          # packaging tree.
          cp packaging/arch/plasmazones.install ci-pkgbuild/

      - name: Build .pkg.tar.zst
        run: |
          set -euo pipefail
          chown -R builder:builder .
          cd ci-pkgbuild
          su builder -c "makepkg --noconfirm -sf"
          mv ./*.pkg.tar.zst ../
        # Surfaces non-zero exit from makepkg (e.g. cmake failure inside
        # build()) as a job failure rather than silently producing no
        # artifact.

      - name: namcap validation
        # Non-fatal — namcap warnings (e.g. about unrecognised licence
        # strings or missing changelog entries on a draft build) shouldn't
        # block the artifact, but we surface them in the job log.
        continue-on-error: true
        run: namcap ./*.pkg.tar.zst

      - name: Generate hand-off PKGBUILD (git-source, for makepkg users)
        # Companion PKGBUILD that pulls the PR branch directly via
        # `git+…#branch=…`. Anyone who doesn't trust the prebuilt binary
        # can drop this + plasmazones.install into a folder and
        # `makepkg -si` to build from source. The pkgver() function
        # produces a sortable version on every rebuild so a later
        # force-push to the PR re-installs cleanly.
        run: |
          set -euo pipefail
          mkdir -p draft-pkgbuild
          BRANCH="${{ steps.meta.outputs.branch_ref }}"
          cat > draft-pkgbuild/PKGBUILD <<PKGBUILD_EOF
          # PlasmaZones — draft build for PR #${{ steps.meta.outputs.pr_number }}
          # Pulls the branch directly from GitHub. To rebuild against new
          # commits on the branch, run \`makepkg -fC -si\` in this folder.
          # SPDX-FileCopyrightText: 2026 fuddlesworth
          # SPDX-License-Identifier: GPL-3.0-or-later
          pkgname=plasmazones-pr
          # pkgver() overwrites this on every build — placeholder must
          # already sort above the canonical stable release so a shallow
          # clone that breaks describe still upgrades cleanly.
          pkgver=${{ steps.meta.outputs.pkgver }}
          pkgrel=1
          pkgdesc="PlasmaZones — draft build for PR #${{ steps.meta.outputs.pr_number }} (${BRANCH})"
          arch=('x86_64')
          url="https://github.com/fuddlesworth/PlasmaZones"
          license=('GPL-3.0-or-later' 'LGPL-2.1-or-later')
          depends=(
              'qt6-base' 'qt6-declarative' 'qt6-shadertools' 'qt6-svg'
              'kconfig' 'kconfigwidgets' 'kirigami'
              'kcmutils' 'kglobalaccel' 'qt6-wayland'
              'kwin>=6.7.0'
          )
          makedepends=('git' 'cmake' 'extra-cmake-modules' 'qt6-tools' 'ninja' 'kwin' 'wayland')
          optdepends=('plasma-activities: activity-based layouts')
          provides=("plasmazones=\$pkgver")
          conflicts=('plasmazones' 'plasmazones-git' 'plasmazones-bin')
          source=("\$pkgname::git+\$url.git#branch=${BRANCH}")
          sha256sums=('SKIP')
          install=plasmazones.install

          pkgver() {
              cd "\$pkgname"
              local cmake_version describe
              cmake_version=\$(sed -n 's/^project(PlasmaZones VERSION \([^ )]*\).*/\1/p' CMakeLists.txt)
              : "\${cmake_version:=0.0.0}"
              if describe=\$(git describe --long --tags 2>/dev/null) && [[ -n "\$describe" ]]; then
                  printf '%s\n' "\$describe" | sed 's/^v//;s/\([^-]*-g\)/r\1/;s/-/./g'
              else
                  printf "%s.pr${{ steps.meta.outputs.pr_number }}.r%s.g%s" "\$cmake_version" "\$(git rev-list --count HEAD)" "\$(git rev-parse --short HEAD)"
              fi
          }

          build() {
              cmake -B build -S "\$pkgname" -G Ninja \\
                  -DCMAKE_BUILD_TYPE=Release \\
                  -DCMAKE_INSTALL_PREFIX=/usr \\
                  -DCMAKE_INSTALL_LIBDIR=lib \\
                  -DBUILD_TESTING=OFF -Wno-dev
              cmake --build build --parallel
          }

          package() {
              DESTDIR="\$pkgdir" cmake --install build
              install -Dm644 "\$pkgname/packaging/arch/kbuildsycoca.hook" \\
                  "\$pkgdir/usr/share/libalpm/hooks/plasmazones-kbuildsycoca.hook"
              install -Dm755 "\$pkgname/packaging/arch/plasmazones-refresh-sycoca" \\
                  "\$pkgdir/usr/share/libalpm/scripts/plasmazones-refresh-sycoca"
              install -Dm644 "\$pkgname/LICENSE"        "\$pkgdir/usr/share/licenses/\$pkgname/LICENSE"
              install -Dm644 "\$pkgname/COPYING.LESSER" "\$pkgdir/usr/share/licenses/\$pkgname/COPYING.LESSER"
          }
          PKGBUILD_EOF
          cp packaging/arch/plasmazones.install draft-pkgbuild/

      - name: Upload .pkg.tar.zst
        uses: actions/upload-artifact@v7
        with:
          name: arch-draft-package
          path: plasmazones-pr-*.pkg.tar.zst
          # 14 days is enough for any reviewer to grab a binary; the next
          # push to the PR re-builds anyway.
          retention-days: 14

      - name: Upload hand-off PKGBUILD
        uses: actions/upload-artifact@v7
        with:
          name: arch-draft-pkgbuild
          path: draft-pkgbuild/
          retention-days: 14

      - name: Post sticky PR comment with install instructions
        # Only for PR events — workflow_dispatch has no PR to comment on.
        if: github.event_name == 'pull_request'
        # marocchino/sticky-pull-request-comment v3.0.4 — SHA-pinned for
        # the same supply-chain reason ccache-action is pinned above.
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0
        with:
          # `header` keys the sticky comment so re-runs update in place
          # instead of stacking new comments per build.
          header: arch-draft-build
          message: |
            ### Draft Arch build for this PR

            **Built against:** KWin `${{ steps.meta.outputs.kwin_ver }}` • commit [`${{ steps.meta.outputs.short_sha }}`](${{ github.event.pull_request.head.repo.html_url }}/commit/${{ github.event.pull_request.head.sha }}) • run [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            **`pkgname=plasmazones-pr` `pkgver=${{ steps.meta.outputs.pkgver }}`** — provides+conflicts with `plasmazones`, so it cleanly replaces a stable install. Roll back with `sudo pacman -S plasmazones` (or `-git` / `-bin`).

            ---

            #### Option A — prebuilt binary (effect needs KWin `${{ steps.meta.outputs.kwin_ver }}`)

            The package installs on any **`kwin>=6.7.0`**, but the kwin-effect plugin's IID embeds KWin's upstream version, so the bundled effect only *loads* on systems running **`kwin=${{ steps.meta.outputs.kwin_ver }}`**. On any other 6.7+ KWin, core tiling still works — KWin just skips the mismatched effect (no drag overlay) until a matching rebuild.

            **Anonymous download (no GitHub account needed)** via [nightly.link](https://nightly.link/), which proxies the workflow artifact:

            - <https://nightly.link/${{ github.repository }}/actions/runs/${{ github.run_id }}/arch-draft-package.zip>

            Or, signed in to GitHub, grab `arch-draft-package` directly from [the run's artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts).

            Then:
            ```
            unzip arch-draft-package.zip
            sudo pacman -U plasmazones-pr-*.pkg.tar.zst
            systemctl --user restart plasmazones.service
            kwin_wayland --replace &   # or just log out / back in
            ```

            #### Option B — rebuild from source (any KWin)

            Anonymous download via nightly.link:

            - <https://nightly.link/${{ github.repository }}/actions/runs/${{ github.run_id }}/arch-draft-pkgbuild.zip>

            Or, signed in: `arch-draft-pkgbuild` from the [run's artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts).

            Then:
            ```
            unzip arch-draft-pkgbuild.zip -d plasmazones-pr-draft
            cd plasmazones-pr-draft
            makepkg -si
            systemctl --user restart plasmazones.service
            kwin_wayland --replace &
            ```
            The PKGBUILD git-clones this PR branch and rebuilds locally, so the KWin pin auto-matches your installed version.

            ---

            <sub>Posted by `.github/workflows/ci.yml` → `build-arch-draft`, fired by the `build-draft` label on this PR. Push events on the PR do **not** auto-rebuild — to refresh the artifacts against new commits, remove and re-add the `build-draft` label. nightly.link is a public third-party proxy; it has no special access — it reads the same artifact GitHub serves and exposes it without auth.</sub>

